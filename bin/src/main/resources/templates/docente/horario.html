<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Mi Horario - Docente')"></head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 m-0 p-0 min-h-screen flex flex-col">

    <div th:replace="fragments/menu :: menu"></div>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold text-gray-900">📚 Mi Horario</h1>
                <p class="text-gray-600 mt-2 text-lg" th:text="${horarioMatriz != null ? horarioMatriz.aulaNombre : 'Tu programa semanal'}"></p>
            </div>
            <div th:if="${horarioMatriz != null}" class="flex gap-3">
                <button onclick="window.print()" class="inline-flex items-center px-5 py-3 bg-gradient-to-r from-blue-500 to-blue-600 text-white hover:from-blue-600 hover:to-blue-700 rounded-lg transition font-semibold shadow-md hover:shadow-lg">
                    <i class="fas fa-print mr-2"></i>Imprimir
                </button>
                <a th:href="'/docente/horario/descargar?idAula=' + ${aulaSeleccionada}" class="inline-flex items-center px-5 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white hover:from-green-600 hover:to-green-700 rounded-lg transition font-semibold shadow-md hover:shadow-lg">
                    <i class="fas fa-download mr-2"></i>Descargar PDF
                </a>
            </div>
        </div>

        <!-- Aula Selector -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6 border border-gray-100">
            <label for="aulaSelect" class="block text-sm font-semibold text-gray-700 mb-3">Seleccionar Aula</label>
            <form method="get" action="/docente/horario" class="flex gap-3">
                <select id="aulaSelect" name="idAula" onchange="this.form.submit()" 
                        class="flex-1 px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none font-semibold cursor-pointer">
                    <option th:each="aula : ${aulas}" 
                            th:value="${aula.idAula}"
                            th:text="${aula.nombre}"
                            th:selected="${aula.idAula == aulaSeleccionada}"></option>
                </select>
            </form>
        </div>

        <!-- Empty State -->
        <div th:if="${horarioMatriz == null}" class="bg-blue-50 border-2 border-blue-200 text-blue-800 px-8 py-12 rounded-xl text-center">
            <i class="fas fa-calendar-times text-5xl mb-4 text-blue-400"></i>
            <p class="text-xl font-bold">Sin horarios asignados</p>
            <p class="text-sm mt-2 text-blue-700">No hay horarios disponibles para las aulas asignadas</p>
        </div>

        <!-- Matriz Table -->
        <div th:if="${horarioMatriz != null}" class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm border-collapse">
                    <thead class="bg-gradient-to-r from-indigo-600 via-blue-600 to-purple-600 text-white">
                        <tr>
                            <th class="border border-gray-200 px-6 py-4 text-center font-bold w-24">Hora</th>
                            <th class="border border-gray-200 px-6 py-4 text-center font-bold">Lunes</th>
                            <th class="border border-gray-200 px-6 py-4 text-center font-bold">Martes</th>
                            <th class="border border-gray-200 px-6 py-4 text-center font-bold">Miercoles</th>
                            <th class="border border-gray-200 px-6 py-4 text-center font-bold">Jueves</th>
                            <th class="border border-gray-200 px-6 py-4 text-center font-bold">Viernes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="hora : ${horarioMatriz.horas}">
                            <!-- Celda de hora -->
                            <td class="border border-gray-200 px-6 py-5 text-center font-bold bg-gradient-to-b from-gray-100 to-gray-50 text-indigo-700 w-24">
                                <span th:text="${#temporals.format(hora, 'HH:mm')}"></span>
                            </td>
                            
                            <!-- Lunes -->
                            <td class="border border-gray-200 px-6 py-5 text-center min-h-28">
                                <div th:if="${horarioMatriz.obtenerHorario(hora, 'Lunes') != null}" 
                                     class="bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-3 border-l-4 border-blue-500 shadow-sm">
                                    <div class="font-bold text-blue-900 text-sm" th:text="${horarioMatriz.obtenerHorario(hora, 'Lunes').cursoNombre}"></div>
                                    <div class="text-xs text-blue-700 mt-1">
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Lunes').horaInicio}"></span> - 
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Lunes').horaFin}"></span>
                                    </div>
                                </div>
                            </td>

                            <!-- Martes -->
                            <td class="border border-gray-200 px-6 py-5 text-center min-h-28">
                                <div th:if="${horarioMatriz.obtenerHorario(hora, 'Martes') != null}" 
                                     class="bg-gradient-to-br from-emerald-50 to-emerald-100 rounded-xl p-3 border-l-4 border-emerald-500 shadow-sm">
                                    <div class="font-bold text-emerald-900 text-sm" th:text="${horarioMatriz.obtenerHorario(hora, 'Martes').cursoNombre}"></div>
                                    <div class="text-xs text-emerald-700 mt-1">
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Martes').horaInicio}"></span> - 
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Martes').horaFin}"></span>
                                    </div>
                                </div>
                            </td>

                            <!-- Miercoles -->
                            <td class="border border-gray-200 px-6 py-5 text-center min-h-28">
                                <div th:if="${horarioMatriz.obtenerHorario(hora, 'Miercoles') != null}" 
                                     class="bg-gradient-to-br from-amber-50 to-amber-100 rounded-xl p-3 border-l-4 border-amber-500 shadow-sm">
                                    <div class="font-bold text-amber-900 text-sm" th:text="${horarioMatriz.obtenerHorario(hora, 'Miercoles').cursoNombre}"></div>
                                    <div class="text-xs text-amber-700 mt-1">
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Miercoles').horaInicio}"></span> - 
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Miercoles').horaFin}"></span>
                                    </div>
                                </div>
                            </td>

                            <!-- Jueves -->
                            <td class="border border-gray-200 px-6 py-5 text-center min-h-28">
                                <div th:if="${horarioMatriz.obtenerHorario(hora, 'Jueves') != null}" 
                                     class="bg-gradient-to-br from-rose-50 to-rose-100 rounded-xl p-3 border-l-4 border-rose-500 shadow-sm">
                                    <div class="font-bold text-rose-900 text-sm" th:text="${horarioMatriz.obtenerHorario(hora, 'Jueves').cursoNombre}"></div>
                                    <div class="text-xs text-rose-700 mt-1">
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Jueves').horaInicio}"></span> - 
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Jueves').horaFin}"></span>
                                    </div>
                                </div>
                            </td>

                            <!-- Viernes -->
                            <td class="border border-gray-200 px-6 py-5 text-center min-h-28">
                                <div th:if="${horarioMatriz.obtenerHorario(hora, 'Viernes') != null}" 
                                     class="bg-gradient-to-br from-violet-50 to-violet-100 rounded-xl p-3 border-l-4 border-violet-500 shadow-sm">
                                    <div class="font-bold text-violet-900 text-sm" th:text="${horarioMatriz.obtenerHorario(hora, 'Viernes').cursoNombre}"></div>
                                    <div class="text-xs text-violet-700 mt-1">
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Viernes').horaInicio}"></span> - 
                                        <span th:text="${horarioMatriz.obtenerHorario(hora, 'Viernes').horaFin}"></span>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Back Button -->
        <div class="mt-8">
            <a href="/docente/panel" class="inline-flex items-center px-5 py-3 border-2 border-gray-300 text-gray-700 hover:bg-gray-100 hover:border-gray-400 rounded-lg transition font-semibold">
                <i class="fas fa-arrow-left mr-2"></i>Volver al Panel
            </a>
        </div>

        <!-- Print Styles -->
        <style media="print">
            @media print {
                .no-print { display: none !important; }
                body { background: white !important; }
                main { max-width: 100% !important; padding: 0 !important; }
                table { border-collapse: collapse; width: 100%; }
                td, th { border: 1px solid #333; padding: 10px; }
                thead { background-color: #1f2937 !important; color: white !important; }
                tbody tr:nth-child(even) { background-color: #f3f4f6 !important; }
                .rounded-xl { border-radius: 8px; }
                .border-l-4 { border-left: 4px solid currentColor; }
            }
        </style>
    </main>

    <div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
