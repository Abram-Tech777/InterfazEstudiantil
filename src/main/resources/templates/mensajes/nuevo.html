<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Nuevo Mensaje')}"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

<div th:replace="~{/fragments/sidebar :: sidebar}"></div>

<main class="flex-1 flex flex-col h-full relative overflow-hidden">

    <header class="h-20 bg-[#a03030] shadow-md px-8 flex items-center justify-between z-10 text-white">
        <h1 class="text-2xl font-bold">Nuevo Mensaje</h1>
        <a th:href="@{/mensajes/inbox}" class="px-4 py-2 bg-white text-[#a03030] rounded-lg text-sm font-bold hover:bg-red-50 transition">
            <i class="fas fa-arrow-left mr-1"></i>Volver
        </a>
    </header>

    <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
        <div class="w-[95%] mx-auto max-w-3xl">

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <form th:action="@{/mensajes/enviar}" method="post" th:object="${mensaje}" enctype="multipart/form-data">
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-user mr-1 text-gray-400"></i> Destinatario
                        </label>
                        <select th:field="*{destinatario.idUsuario}" required class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:border-[#a03030] focus:ring-1 focus:ring-[#a03030] transition">
                            <option value="">-- Seleccione --</option>
                            <option th:each="d : ${docentes}" th:value="${d.idUsuario}" th:text="${d.nombreCompleto}" th:if="${!#lists.isEmpty(docentes)}"></option>
                        </select>
                        <div th:if="${#lists.isEmpty(docentes)}" class="text-sm text-gray-500 mt-2 bg-yellow-50 border border-yellow-200 rounded-xl p-3">
                            <i class="fas fa-info-circle mr-1 text-yellow-600"></i>No hay destinatarios disponibles para seleccionar.
                        </div>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-tag mr-1 text-gray-400"></i> Asunto
                        </label>
                        <input th:field="*{asunto}" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:border-[#a03030] focus:ring-1 focus:ring-[#a03030] transition" placeholder="Asunto del mensaje" />
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-comment mr-1 text-gray-400"></i> Mensaje
                        </label>
                        <textarea th:field="*{contenido}" rows="6" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:border-[#a03030] focus:ring-1 focus:ring-[#a03030] transition" placeholder="Escribe tu mensaje aquí..." required></textarea>
                    </div>
                    <div class="mb-8">
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-paperclip mr-1 text-gray-400"></i> Adjuntar archivos <span class="text-gray-400 font-normal">(opcional, máx. 4)</span>
                            <span id="fileCount" class="ml-2 text-xs text-gray-500 font-normal bg-gray-100 px-3 py-1 rounded-full">0/4</span>
                        </label>
                        <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 bg-gray-50 hover:bg-gray-100 transition cursor-pointer">
                            <input type="file" name="files" multiple class="w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-[#a03030] file:text-white hover:file:bg-[#7d1f1f] transition" id="fileInput" onchange="updateFileCount(this)" />
                        </div>
                        <p class="text-xs text-gray-400 mt-2"><i class="fas fa-info-circle mr-1"></i>Máximo 20 MB total. Hasta 4 archivos. Formatos: .jpg, .png, .gif, .pdf, .doc, .docx</p>
                    </div>
                    <div class="flex gap-4 pt-4 border-t border-gray-100">
                        <button type="submit" class="px-6 py-3 bg-[#a03030] text-white rounded-xl font-bold hover:bg-[#7d1f1f] transition shadow-sm flex items-center gap-2">
                            <i class="fas fa-paper-plane"></i> Enviar
                        </button>
                        <a th:href="@{/mensajes/inbox}" class="px-6 py-3 border border-gray-200 text-gray-600 rounded-xl font-bold hover:bg-gray-50 transition flex items-center gap-2">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </div>

</main>

<div th:replace="~{/fragments/scripts :: scripts}"></div>
<script>
function updateFileCount(input) {
    const count = input.files.length;
    document.getElementById('fileCount').textContent = count + '/4';
    if (count > 4) {
        alert('Máximo 4 archivos permitidos.');
        input.value = '';
        document.getElementById('fileCount').textContent = '0/4';
    }
}
document.querySelector('form').addEventListener('submit', function(e) {
    const fileInput = document.getElementById('fileInput');
    if (fileInput.files.length > 4) {
        e.preventDefault();
        alert('Máximo 4 archivos permitidos.');
    }
});
</script>
</body>
</html>
