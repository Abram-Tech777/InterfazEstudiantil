<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Chat')}"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

<div th:replace="~{/fragments/sidebar :: sidebar}"></div>

<main class="flex-1 flex flex-col h-full relative overflow-hidden">

    <header class="h-20 bg-[#a03030] shadow-md px-8 flex items-center justify-between z-10 text-white">
        <div class="flex items-center gap-3">
            <a th:href="@{/mensajes/inbox}" class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center hover:bg-white/30 transition">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-xl font-bold" th:text="${contacto.nombreCompleto}"></h1>
                <p class="text-xs text-white/70"><i class="fas fa-comment mr-1"></i>Conversación</p>
            </div>
        </div>
        <a th:href="@{/mensajes/nuevo(to=${contacto.idUsuario})}" class="px-4 py-2 bg-white text-[#a03030] rounded-lg text-sm font-bold hover:bg-red-50 transition">
            <i class="fas fa-envelope mr-1"></i>Nuevo Mensaje
        </a>
    </header>

    <div id="newMsgBanner" class="hidden bg-blue-600 text-white px-6 py-3 flex items-center justify-between shadow-md cursor-pointer hover:bg-blue-700 transition" onclick="scrollToNewMessages()">
        <div class="flex items-center gap-3">
            <i class="fas fa-bell"></i>
            <span id="newMsgText">Nuevo mensaje</span>
        </div>
        <i class="fas fa-chevron-down"></i>
    </div>

    <div class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar" id="chatBox">
        <div class="max-w-4xl mx-auto space-y-4" id="chatMessages">

            <div th:if="${refTitulo != null}" class="bg-amber-50 border border-amber-200 rounded-2xl px-5 py-4 shadow-sm flex items-start gap-3 cursor-pointer hover:bg-amber-100 transition" id="refCard" th:attr="onclick='window.location.href=\'' + ${enlaceAnuncio} + '\''" title="Ver anuncio">
                <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center shrink-0">
                    <i class="fas fa-quote-left text-amber-600"></i>
                </div>
                <div class="min-w-0 flex-1">
                    <p class="text-xs text-amber-600 font-semibold uppercase tracking-wide">Respondiendo a anuncio</p>
                    <p class="text-sm text-amber-900 font-semibold mt-0.5 truncate" th:text="${refTitulo}"></p>
                </div>
                <button type="button" onclick="event.stopPropagation(); this.parentElement.remove()" class="ml-auto w-6 h-6 rounded-full bg-amber-200 text-amber-600 flex items-center justify-center hover:bg-amber-300 transition shrink-0">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>

            <div th:if="${#lists.isEmpty(conversacion)}" class="text-center py-16" id="emptyMsg">
                <div class="w-20 h-20 rounded-full bg-gray-200 flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-comment-dots text-3xl text-gray-400"></i>
                </div>
                <p class="text-gray-500 font-bold text-lg">No hay mensajes aún</p>
                <p class="text-gray-400 text-sm mt-1">Envía el primer mensaje para iniciar la conversación.</p>
            </div>

            <div th:each="m : ${conversacion}" th:class="${m.remitente.idUsuario == currentUserId} ? 'flex justify-end' : 'flex justify-start'">
                <div th:class="${m.remitente.idUsuario == currentUserId} ? 'max-w-[70%] bg-[#a03030] text-white rounded-2xl rounded-br-md px-5 py-3 shadow-sm' : 'max-w-[70%] bg-white text-gray-800 rounded-2xl rounded-bl-md px-5 py-3 shadow-sm border border-gray-100'">
                    <div th:if="${m.comunicadoReferencia != null}" class="mb-2 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 text-xs flex items-start gap-2 cursor-pointer hover:bg-amber-100 transition" th:attr="onclick='window.location.href=\'' + ${enlaceAnuncio} + '\''" title="Ver anuncio">
                        <i class="fas fa-quote-left text-amber-500 mt-0.5"></i>
                        <div class="min-w-0">
                            <p class="text-amber-700 font-semibold truncate" th:text="${m.comunicadoReferencia.titulo}"></p>
                            <p class="text-amber-500">Anuncio relacionado</p>
                        </div>
                    </div>
                    <p class="whitespace-pre-wrap text-sm leading-relaxed" th:text="${m.contenido}"></p>

                    <div th:if="${m.archivos != null and !m.archivos.isEmpty()}" class="mt-3 space-y-2">
                        <div th:each="archivo : ${m.archivos}" class="flex flex-col gap-1">
                            <div th:class="${m.remitente.idUsuario == currentUserId} ? 'bg-white/20 rounded-lg p-2 flex items-center gap-2' : 'bg-gray-100 rounded-lg p-2 flex items-center gap-2'" style="min-width:0;">
                                <i th:class="${#strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.pdf') ? 'fas fa-file-pdf text-red-500' : (#strings.startsWith(archivo.archivoTipo, 'image/') ? 'fas fa-image text-blue-500' : (#strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.docx') or #strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.doc') ? 'fas fa-file-word text-blue-600' : 'fas fa-file text-yellow-500'))}"></i>
                                <span class="text-xs truncate max-w-[120px]" th:text="${archivo.archivoNombre}"></span>
                                <div class="flex gap-1 ml-1 shrink-0">
                                    <button th:if="${#strings.startsWith(archivo.archivoTipo, 'image/') or #strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.pdf') or #strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.docx')}"
                                            class="preview-toggle px-2 py-0.5 rounded text-xs hover:bg-white/50 transition"
                                            th:classappend="${m.remitente.idUsuario == currentUserId} ? 'bg-white/30' : 'bg-gray-200'"
                                            th:attr="data-archivoid=${archivo.idArchivo}, data-url=@{/mensajes/abrirArchivo/{id}(id=${archivo.idArchivo})}, data-tipo=${archivo.archivoTipo}, data-ext=${#strings.toLowerCase(#strings.substringAfter(archivo.archivoNombre, '.'))}">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <a th:href="@{/mensajes/descargarArchivo/{id}(id=${archivo.idArchivo})}" class="px-2 py-0.5 bg-white/30 rounded text-xs hover:bg-white/50 transition">
                                        <i class="fas fa-download"></i>
                                    </a>
                                </div>
                            </div>
                            <div class="preview-cont hidden">
                                <div th:if="${#strings.startsWith(archivo.archivoTipo, 'image/')}" class="rounded-lg overflow-hidden border" th:classappend="${m.remitente.idUsuario == currentUserId} ? 'border-white/20' : 'border-gray-200'">
                                    <img th:src="@{/mensajes/abrirArchivo/{id}(id=${archivo.idArchivo})}" class="w-full max-h-96 object-contain rounded-lg" />
                                </div>
                                <div th:if="${#strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.pdf')}" class="rounded-lg overflow-hidden border" th:classappend="${m.remitente.idUsuario == currentUserId} ? 'border-white/20' : 'border-gray-200'">
                                    <embed th:src="${'/mensajes/abrirArchivo/' + archivo.idArchivo + '#toolbar=0'}" type="application/pdf" class="w-full h-[500px] rounded-lg" />
                                </div>
                                <div th:if="${#strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.docx')}" class="docx-preview-placeholder text-center py-4 text-sm text-gray-500">
                                    <i class="fas fa-file-word text-blue-500 text-2xl mb-2"></i>
                                    <p>Cargando vista previa...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:class="${m.remitente.idUsuario == currentUserId} ? 'text-xs text-white/60 mt-2 text-right' : 'text-xs text-gray-400 mt-2 text-left'" th:text="${#temporals.format(m.fechaEnvio, 'dd/MM/yyyy hh:mm a')}"></div>
                </div>
            </div>

        </div>
    </div>

    <div class="bg-white border-t border-gray-200 px-4 md:px-8 py-4">
        <form id="chatForm" enctype="multipart/form-data" class="max-w-4xl mx-auto flex flex-col gap-2">
            <input type="hidden" id="hdnCurrentUserId" th:value="${currentUserId}" />
            <input type="hidden" id="hdnDestinatarioId" th:value="${contacto.idUsuario}" />
            <input type="hidden" name="destinatarioId" th:value="${contacto.idUsuario}" />
            <input type="hidden" name="refId" th:if="${refId != null}" th:value="${refId}" />
            <input type="hidden" id="lastCheckVal" th:value="${lastCheck}" />
            <input type="hidden" id="hdnEnlaceAnuncio" th:value="${enlaceAnuncio}" />

            <div id="filePreviewList" class="flex flex-wrap gap-2 hidden"></div>
            <div id="fileErrorCard" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-center gap-3">
                <i class="fas fa-exclamation-circle text-lg shrink-0"></i>
                <span id="fileErrorMsg">Tamaño máximo alcanzado. Elimine algunos archivos.</span>
            </div>

            <div class="flex gap-2 items-end">
                <div class="flex-1 flex flex-col gap-2">
                    <textarea name="contenido" rows="2" id="chatInput" class="w-full p-3 border border-gray-200 rounded-xl resize-none focus:border-[#a03030] focus:ring-1 focus:ring-[#a03030] transition" placeholder="Escribe tu mensaje..."></textarea>
                    <label class="flex items-center gap-2 text-xs text-gray-500 cursor-pointer hover:text-[#a03030] transition">
                        <i class="fas fa-paperclip"></i>
                        <span id="chatFileLabel">Adjuntar archivos</span>
                        <input type="file" multiple class="hidden" id="chatFiles" accept=".jpg,.jpeg,.png,.gif,.bmp,.webp,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip" />
                    </label>
                </div>
                <button type="submit" id="sendBtn" class="px-6 py-3 bg-[#a03030] text-white rounded-xl font-bold hover:bg-[#7d1f1f] transition shadow-sm h-[52px] flex items-center gap-2">
                    <i class="fas fa-paper-plane"></i>
                    <span class="hidden md:inline">Enviar</span>
                </button>
            </div>
        </form>
    </div>

</main>

<div th:replace="~{/fragments/scripts :: scripts}"></div>
<script>
var currentUserId = parseInt(document.getElementById('hdnCurrentUserId').value);
var destinatarioId = parseInt(document.getElementById('hdnDestinatarioId').value);
var enlaceAnuncio = document.getElementById('hdnEnlaceAnuncio').value;
var chatBox = document.getElementById('chatBox');
var chatMessages = document.getElementById('chatMessages');
var form = document.getElementById('chatForm');
var chatInput = document.getElementById('chatInput');
var chatFiles = document.getElementById('chatFiles');
var filePreviewList = document.getElementById('filePreviewList');
var chatFileLabel = document.getElementById('chatFileLabel');
var selectedFiles = [];
var MAX_FILE_SIZE = 20 * 1024 * 1024;

chatBox.scrollTop = chatBox.scrollHeight;

document.querySelectorAll('.preview-toggle').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        togglePreview(this);
    });
});

function togglePreview(btn, forceExpand) {
    var cont = btn.closest('.flex.flex-col').querySelector('.preview-cont');
    if (!cont) return;
    var archivoId = btn.getAttribute('data-archivoid');
    var url = btn.getAttribute('data-url');
    var ext = btn.getAttribute('data-ext') || '';
    var isHidden = cont.classList.contains('hidden');
    var expand = forceExpand !== undefined ? forceExpand : isHidden;
    if (expand) {
        cont.classList.remove('hidden');
        btn.querySelector('i').className = 'fas fa-eye-slash';
        localStorage.setItem('chat-preview-' + archivoId, '1');
        if (ext === 'docx' || (!ext && cont.querySelector('.docx-preview-placeholder'))) {
            var placeholder = cont.querySelector('.docx-preview-placeholder');
            if (placeholder) {
                var docUrl = url || '/mensajes/abrirArchivo/' + archivoId;
                fetch(docUrl)
                    .then(function(r) {
                        if (!r.ok) throw new Error('Error');
                        return r.arrayBuffer();
                    })
                    .then(function(buffer) {
                        return mammoth.convertToHtml({arrayBuffer: buffer});
                    })
                    .then(function(result) {
                        cont.innerHTML = '<div class="rounded-xl border border-gray-200 p-4 bg-white max-h-[400px] overflow-y-auto text-xs leading-relaxed">' + result.value + '</div>';
                    })
                    .catch(function() {
                        if (placeholder) placeholder.innerHTML = '<i class="fas fa-exclamation-triangle text-yellow-500 text-lg mb-1"></i><p>No se pudo cargar la vista previa.</p>';
                    });
            }
        }
    } else {
        cont.classList.add('hidden');
        btn.querySelector('i').className = 'fas fa-eye';
        // Don't clear preview content - just hide it
    }
}

chatFiles.addEventListener('change', function() {
    for (var i = 0; i < this.files.length; i++) {
        var file = this.files[i];
        var exists = selectedFiles.some(function(f) { return f.name === file.name && f.size === file.size && f.lastModified === file.lastModified; });
        if (!exists) selectedFiles.push(file);
    }
    this.value = '';
    renderFilePreviews();
    checkFileSize();
});

function removeFile(index) {
    selectedFiles.splice(index, 1);
    renderFilePreviews();
    checkFileSize();
}

function renderFilePreviews() {
    filePreviewList.innerHTML = '';
    if (selectedFiles.length === 0) {
        filePreviewList.classList.add('hidden');
        chatFileLabel.textContent = 'Adjuntar archivos';
        return;
    }
    filePreviewList.classList.remove('hidden');
    chatFileLabel.textContent = selectedFiles.length + ' archivo(s)';
    selectedFiles.forEach(function(file, idx) {
        var isImage = file.type.startsWith('image/');
        var isPdf = file.name.toLowerCase().endsWith('.pdf');
        var icon = isImage ? 'fa-image text-blue-500' : isPdf ? 'fa-file-pdf text-red-500' : 'fa-file text-yellow-500';
        var size = (file.size / 1024).toFixed(1) + ' KB';
        var div = document.createElement('div');
        div.className = 'flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs';
        div.innerHTML = '<i class="fas ' + icon + '"></i><span class="truncate max-w-[150px]">' + file.name + '</span><span class="text-gray-400">' + size + '</span><button type="button" onclick="removeFile(' + idx + ')" class="ml-1 w-4 h-4 rounded-full bg-red-100 text-red-500 flex items-center justify-center hover:bg-red-200 transition"><i class="fas fa-times text-[10px]"></i></button>';
        filePreviewList.appendChild(div);
    });
}

function checkFileSize() {
    var card = document.getElementById('fileErrorCard');
    var total = 0;
    selectedFiles.forEach(function(f) { total += f.size; });
    if (total > MAX_FILE_SIZE) {
        card.classList.remove('hidden');
    } else {
        card.classList.add('hidden');
    }
}

form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (!chatInput.value.trim() && selectedFiles.length === 0) return;

    var total = 0;
    selectedFiles.forEach(function(f) { total += f.size; });
    if (total > MAX_FILE_SIZE) {
        document.getElementById('fileErrorCard').classList.remove('hidden');
        return;
    }

    var sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    var fd = new FormData();
    fd.append('destinatarioId', destinatarioId);
    fd.append('contenido', chatInput.value.trim());
    var refInput = document.querySelector('input[name="refId"]');
    if (refInput) fd.append('refId', refInput.value);
    selectedFiles.forEach(function(file) { fd.append('files', file); });

    fetch('/mensajes/chat/enviar', {
        method: 'POST',
        body: fd,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(function(r) {
        if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Error al enviar'); });
        return r.json();
    })
    .then(function(data) {
        appendMessage(data);
        chatInput.value = '';
        selectedFiles = [];
        renderFilePreviews();
        var emptyMsg = document.getElementById('emptyMsg');
        if (emptyMsg) emptyMsg.remove();
    })
    .catch(function(err) {
        alert(err.message || 'Error al enviar el mensaje');
    })
    .finally(function() {
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i><span class="hidden md:inline"> Enviar</span>';
    });
});

function appendMessage(data) {
    var isMine = data.remitenteId === currentUserId;
    var wrapper = document.createElement('div');
    wrapper.className = isMine ? 'flex justify-end' : 'flex justify-start';

    var bubble = document.createElement('div');
    bubble.className = isMine ? 'max-w-[70%] bg-[#a03030] text-white rounded-2xl rounded-br-md px-5 py-3 shadow-sm' : 'max-w-[70%] bg-white text-gray-800 rounded-2xl rounded-bl-md px-5 py-3 shadow-sm border border-gray-100';

    if (data.refId) {
        var refDiv = document.createElement('div');
        refDiv.className = 'mb-2 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 text-xs flex items-start gap-2 cursor-pointer hover:bg-amber-100 transition';
        refDiv.setAttribute('onclick', "window.location.href='" + enlaceAnuncio + "'");
        refDiv.setAttribute('title', 'Ver anuncio');
        refDiv.innerHTML = '<i class="fas fa-quote-left text-amber-500 mt-0.5"></i><div class="min-w-0"><p class="text-amber-700 font-semibold truncate">' + (data.refTitulo || 'Anuncio') + '</p><p class="text-amber-500">Anuncio relacionado</p></div>';
        bubble.appendChild(refDiv);
    }

    var p = document.createElement('p');
    p.className = 'whitespace-pre-wrap text-sm leading-relaxed';
    p.textContent = data.contenido || '';
    bubble.appendChild(p);

    if (data.archivos && data.archivos.length > 0) {
        var filesDiv = document.createElement('div');
        filesDiv.className = 'mt-3 space-y-2';
        data.archivos.forEach(function(archivo) {
            var ext = archivo.archivoNombre.split('.').pop().toLowerCase();
            var isImage = ['jpg','jpeg','png','gif','bmp','webp'].indexOf(ext) !== -1;
            var isPdf = ext === 'pdf';
            var isDocx = ext === 'docx';
            var icon = isImage ? 'fa-image' : isPdf ? 'fa-file-pdf' : isDocx ? 'fa-file-word' : 'fa-file';
            var hasPreview = isImage || isPdf || isDocx;
            var fileItem = document.createElement('div');
            fileItem.className = 'flex flex-col gap-1';
            var row = document.createElement('div');
            row.className = isMine ? 'bg-white/20 rounded-lg p-2 flex items-center gap-2' : 'bg-gray-100 rounded-lg p-2 flex items-center gap-2';
            row.style.minWidth = '0';
            row.innerHTML = '<i class="fas ' + icon + '"></i><span class="text-xs truncate max-w-[120px]">' + archivo.archivoNombre + '</span><div class="flex gap-1 ml-1 shrink-0">' +
                (hasPreview ? '<button class="preview-toggle px-2 py-0.5 rounded text-xs ' + (isMine ? 'bg-white/30' : 'bg-gray-200') + ' hover:bg-white/50 transition" data-archivoid="' + archivo.idArchivo + '" data-url="/mensajes/abrirArchivo/' + archivo.idArchivo + '" data-tipo="' + (archivo.archivoTipo || '') + '" data-ext="' + ext + '"><i class="fas fa-eye"></i></button>' : '') +
                '<a href="/mensajes/descargarArchivo/' + archivo.idArchivo + '" class="px-2 py-0.5 bg-white/30 rounded text-xs hover:bg-white/50 transition"><i class="fas fa-download"></i></a></div>';
            fileItem.appendChild(row);
            var previewCont = document.createElement('div');
            previewCont.className = 'preview-cont hidden';
            if (isImage) {
                previewCont.innerHTML = '<div class="rounded-lg overflow-hidden border ' + (isMine ? 'border-white/20' : 'border-gray-200') + '"><img src="/mensajes/abrirArchivo/' + archivo.idArchivo + '" class="w-full max-h-96 object-contain rounded-lg" /></div>';
            } else if (isPdf) {
                previewCont.innerHTML = '<div class="rounded-lg overflow-hidden border ' + (isMine ? 'border-white/20' : 'border-gray-200') + '"><embed src="/mensajes/abrirArchivo/' + archivo.idArchivo + '#toolbar=0" type="application/pdf" class="w-full h-[500px] rounded-lg" /></div>';
            } else if (isDocx) {
                previewCont.innerHTML = '<div class="docx-preview-placeholder text-center py-3 text-xs text-gray-400"><i class="fas fa-file-word text-blue-500 text-xl mb-1"></i><p>Cargando vista previa...</p></div>';
            }
            fileItem.appendChild(previewCont);
            filesDiv.appendChild(fileItem);
        });
        bubble.appendChild(filesDiv);
    }

    var time = document.createElement('div');
    time.className = isMine ? 'text-xs text-white/60 mt-2 text-right' : 'text-xs text-gray-400 mt-2 text-left';
    time.textContent = data.fechaEnvio || '';
    bubble.appendChild(time);

    wrapper.appendChild(bubble);
    chatMessages.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;

    wrapper.querySelectorAll('.preview-toggle').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            togglePreview(this);
        });
    });
}

// ===== NEW MESSAGE POLLING =====
var lastCheck = document.getElementById('lastCheckVal').value;
var newMsgBanner = document.getElementById('newMsgBanner');
var newMsgText = document.getElementById('newMsgText');
var pollingActive = true;

// Mark incoming messages as read on page load
fetch('/mensajes/chat/nuevos/' + destinatarioId + '?after=2000-01-01T00:00:00')
    .then(function(r) { return r.json(); })
    .then(function(mensajes) {
        mensajes.forEach(function(m) {
            if (m.remitenteId !== currentUserId) {
                fetch('/mensajes/ver/' + m.id, { method: 'GET' }).catch(function(){});
            }
        });
    }).catch(function(){});

setInterval(function() {
    if (!pollingActive) return;
    fetch('/mensajes/chat/nuevos/' + destinatarioId + '?after=' + encodeURIComponent(lastCheck))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) return;
            if (data.length > 0) {
                data.forEach(function(m) {
                    appendMessage(m);
                    var emptyMsg = document.getElementById('emptyMsg');
                    if (emptyMsg) emptyMsg.remove();
                    if (m.remitenteId !== currentUserId) {
                        fetch('/mensajes/ver/' + m.id, { method: 'GET' }).catch(function(){});
                    }
                });
                lastCheck = data[data.length - 1].fechaIso || lastCheck;
                var isAtBottom = chatBox.scrollTop + chatBox.clientHeight >= chatBox.scrollHeight - 50;
                if (!isAtBottom) {
                    var name = data[0].remitenteNombre || ' alguien';
                    newMsgText.textContent = 'Nuevo mensaje de ' + name;
                    newMsgBanner.classList.remove('hidden');
                } else {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
                updateUnreadBadge();
            }
        }).catch(function(){});
}, 5000);

function scrollToNewMessages() {
    newMsgBanner.classList.add('hidden');
    chatBox.scrollTop = chatBox.scrollHeight;
}

function updateUnreadBadge() {
    var badge = document.getElementById('noLeidosBadge');
    if (!badge) return;
    fetch('/mensajes/no-leidos')
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.count > 0) {
                badge.textContent = d.count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }).catch(function(){});
}

chatBox.addEventListener('scroll', function() {
    var isAtBottom = chatBox.scrollTop + chatBox.clientHeight >= chatBox.scrollHeight - 50;
    if (isAtBottom) {
        newMsgBanner.classList.add('hidden');
    }
});
</script>
