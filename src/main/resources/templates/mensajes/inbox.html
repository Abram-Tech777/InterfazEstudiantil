<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Bandeja de Mensajes')}"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

<div th:replace="~{/fragments/sidebar :: sidebar}"></div>

<main class="flex-1 flex flex-col h-full relative overflow-hidden">

    <header class="h-20 bg-[#a03030] shadow-md px-8 flex items-center justify-between z-10 text-white">
        <h1 class="text-2xl font-bold">Bandeja de Mensajes</h1>
        <div class="flex items-center gap-3">
            <form th:action="@{/mensajes/vaciar-inbox}" method="post" onsubmit="return confirm('Â¿Vaciar toda la bandeja?')" th:if="${!#lists.isEmpty(inbox)}">
                <button type="submit" class="px-4 py-2 bg-white/20 text-white rounded-lg text-sm font-bold hover:bg-white/30 transition flex items-center gap-2">
                    <i class="fas fa-trash-alt"></i>Vaciar buzÃ³n
                </button>
            </form>
            <a th:href="@{/mensajes/nuevo}" class="px-4 py-2 bg-white text-[#a03030] rounded-lg text-sm font-bold hover:bg-red-50 transition">
                <i class="fas fa-pen mr-1"></i>Nuevo Mensaje
            </a>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
        <div class="w-[95%] mx-auto">

            <input type="hidden" id="currentUserId" th:value="${currentUserId}" />

            <div th:if="${#lists.isEmpty(inbox)}" class="bg-blue-50 border border-blue-200 text-blue-800 px-6 py-12 rounded-2xl text-center shadow-sm">
                <i class="fas fa-inbox text-4xl mb-4 text-blue-400"></i>
                <p class="text-xl font-bold">Bandeja vacÃ­a</p>
                <p class="text-sm text-blue-600 mt-2">No tienes mensajes recibidos por el momento.</p>
            </div>

            <div th:each="m : ${inbox}" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all duration-300 mb-4" th:classappend="${m.remitente.idUsuario == currentUserId} ? 'border-l-4 border-l-blue-400' : ''">
                <div class="px-6 py-5 flex justify-between items-start">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <strong class="text-gray-800" th:text="${m.remitente.nombreCompleto}"></strong>
                            <span th:if="${m.remitente.idUsuario == currentUserId}" class="text-xs text-blue-500 font-semibold bg-blue-50 px-2 py-0.5 rounded-full">Enviado</span>
                            <span th:if="${!m.leido and m.remitente.idUsuario != currentUserId}" class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block shrink-0"></span>
                        </div>
                        <p class="text-sm text-gray-500 mt-1 truncate">
                            <span th:if="${m.remitente.idUsuario == currentUserId}" class="text-xs text-gray-400 mr-1"><i class="fas fa-arrow-right"></i> Para: <span th:text="${m.destinatario.nombreCompleto}"></span></span>
                            <span th:text="${m.asunto}"></span>
                            <span class="text-xs text-gray-400 ml-2" th:text="${#temporals.format(m.fechaEnvio, 'dd/MM/yyyy hh:mm a')}"></span>
                        </p>
                    </div>
                    <div class="flex items-center gap-2 shrink-0 ml-4">
                        <button class="abrir-msj px-4 py-2 bg-[#a03030] text-white rounded-xl text-sm font-bold hover:bg-[#7d1f1f] transition" th:attr="data-id=${m.idMensaje},data-to=${m.remitente.idUsuario},data-asunto='Re: ' + ${m.asunto}">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <form th:action="@{/mensajes/eliminar/{id}(id=${m.idMensaje})}" method="post" onsubmit="return confirm('Â¿Eliminar este mensaje?')">
                            <button type="submit" class="w-9 h-9 rounded-xl bg-gray-100 text-gray-400 hover:bg-red-100 hover:text-red-600 transition flex items-center justify-center" title="Eliminar mensaje">
                                <i class="fas fa-times"></i>
                            </button>
                        </form>
                    </div>
                </div>
                <div class="hidden contenido-msj border-t border-gray-100" th:attrappend="id='msj-' + ${m.idMensaje}"></div>
            </div>

        </div>
    </div>

</main>

<div th:replace="~{/fragments/scripts :: scripts}"></div>
<script>
function renderArchivo(archivo, mensajeId) {
    var ext = archivo.archivoNombre.split('.').pop().toLowerCase();
    var isImage = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'].includes(ext);
    var isPdf = ext === 'pdf';
    var isDoc = ext === 'docx' || ext === 'doc';
    var icon = isImage ? 'fa-image text-blue-500' : isPdf ? 'fa-file-pdf text-red-500' : isDoc ? 'fa-file-word text-blue-600' : 'fa-file text-yellow-500';
    var previewUrl = isImage ? '/mensajes/abrirArchivo/' + archivo.idArchivo : (isPdf ? '/mensajes/abrirArchivo/' + archivo.idArchivo : (isDoc ? '/mensajes/abrirArchivo/' + archivo.idArchivo : null));
    var downloadUrl = '/mensajes/descargarArchivo/' + archivo.idArchivo;
    var html = '<div class="archivo-item bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-sm transition">';
    html += '<div class="p-3 flex items-center gap-3">';
    html += '<div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center"><i class="fas ' + icon + '"></i></div>';
    html += '<span class="text-sm font-semibold text-gray-700 truncate flex-1">' + archivo.archivoNombre + '</span>';
    html += '<div class="flex gap-1 shrink-0">';
    if (previewUrl) {
        html += '<button class="preview-btn px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition" data-url="' + previewUrl + '" data-ext="' + ext + '" data-archivoid="' + archivo.idArchivo + '"><i class="fas fa-eye"></i></button>';
    }
    html += '<a href="' + downloadUrl + '" class="px-2 py-1 text-xs bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition"><i class="fas fa-download"></i></a>';
    html += '</div></div>';
    html += '<div class="archivo-preview-cont hidden"></div>';
    html += '</div>';
    return html;
}

function renderReplyForm(id, toUserId, asunto) {
    var html = '<div class="reply-section mt-4 pt-4 border-t border-gray-200" id="replySection-' + id + '">';
    html += '<p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3"><i class="fas fa-reply mr-1"></i>Responder</p>';
    html += '<div class="replies-container space-y-3 mb-4" id="replies-' + id + '"></div>';
    html += '<textarea rows="2" class="reply-input w-full p-3 border border-gray-200 rounded-xl resize-none focus:border-[#a03030] focus:ring-1 focus:ring-[#a03030] transition" placeholder="Escribe tu respuesta..." id="replyInput-' + id + '"></textarea>';
    html += '<div class="flex items-center gap-2 mt-3">';
    html += '<label class="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer hover:text-[#a03030] transition px-3 py-2 rounded-lg hover:bg-gray-100">';
    html += '<i class="fas fa-paperclip"></i><span>Adjuntar archivos</span>';
    html += '<input type="file" multiple class="hidden reply-file-input" accept=".jpg,.jpeg,.png,.gif,.bmp,.webp,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip" data-id="' + id + '" />';
    html += '</label>';
    html += '<div class="reply-file-previews flex flex-wrap gap-2 flex-1" id="replyFilePreviews-' + id + '"></div>';
    html += '<button class="send-reply-btn px-5 py-2 bg-green-600 text-white rounded-xl text-sm font-bold hover:bg-green-700 transition shadow-sm flex items-center gap-2" data-id="' + id + '" data-to="' + toUserId + '" data-asunto="' + asunto.replace(/"/g, '&quot;') + '">';
    html += '<i class="fas fa-paper-plane text-xs"></i> Enviar';
    html += '</button>';
    html += '</div>';
    html += '<div class="reply-error hidden mt-2 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-2 text-xs flex items-center gap-2" id="replyError-' + id + '">';
    html += '<i class="fas fa-exclamation-circle"></i><span class="reply-error-msg">Error</span>';
    html += '</div>';
    html += '</div>';
    return html;
}

function appendReplyBubble(data, id) {
    var repliesContainer = document.getElementById('replies-' + id);
    if (!repliesContainer) return;
    var currentUserId = parseInt(document.getElementById('currentUserId').value);
    var isMine = data.remitenteId === currentUserId;

    // Collapse all previous bubbles: hide their content, show summary bar
    var allExisting = repliesContainer.children;
    for (var ei = 0; ei < allExisting.length; ei++) {
        var eb = allExisting[ei];
        if (eb.classList.contains('minimized')) continue;
        eb.classList.add('minimized');
        var ebContent = eb.querySelector('.bubble-content');
        var ebName = eb.querySelector('.reply-name');
        var ebTime = eb.querySelector('.reply-time');
        if (ebContent) ebContent.style.display = 'none';
        var summary = eb.querySelector('.bubble-summary');
        if (!summary) {
            summary = document.createElement('div');
            summary.className = 'bubble-summary';
            var sName = ebName ? ebName.textContent : '';
            var sTime = ebTime ? ebTime.textContent : '';
            summary.innerHTML = '<div class="text-xs text-gray-400 cursor-pointer hover:text-gray-600 transition flex items-center gap-1.5 px-2 py-1 select-none" onclick="toggleMinimized(this)"><i class="fas fa-chevron-right text-[10px]"></i><span>' + sName + '</span><span class="text-gray-300">Â·</span><span>' + sTime + '</span></div>';
            var inner = eb.firstChild || eb;
            inner.insertBefore(summary, ebContent);
        }
    }

    // Collapse pre-rendered thread responses into "Ver X anteriores"
    var threadContainer = document.getElementById('threadContainer-' + id);
    if (threadContainer && !threadContainer.classList.contains('compacted')) {
        threadContainer.classList.add('compacted');
        var respItems = threadContainer.querySelectorAll('.respuesta-item');
        var threadVerMas = threadContainer.querySelector('.ver-mas-respuestas');
        if (threadVerMas) threadVerMas.remove();
        var total = respItems.length;
        // Hide all pre-rendered items
        for (var ri2 = 0; ri2 < respItems.length; ri2++) {
            respItems[ri2].style.display = 'none';
        }
        var counterDiv = document.createElement('div');
        counterDiv.className = 'text-xs text-gray-400 mb-2 flex items-center gap-2';
        counterDiv.innerHTML = '<button class="show-more-thread text-[#a03030] font-bold hover:underline flex items-center gap-1" onclick="expandAllThread(\'' + id + '\')"><i class="fas fa-chevron-up text-[10px]"></i> Ver ' + total + ' respuestas anteriores</button>';
        threadContainer.insertBefore(counterDiv, threadContainer.querySelector('.space-y-3'));
    }

    // Create new bubble
    var wrapper = document.createElement('div');
    wrapper.className = isMine ? 'flex justify-end' : 'flex justify-start';

    var inner = document.createElement('div');
    inner.className = isMine ? 'max-w-[80%] bg-[#a03030] text-white rounded-2xl rounded-br-md px-4 py-3 shadow-sm' : 'max-w-[80%] bg-white text-gray-800 rounded-2xl rounded-bl-md px-4 py-3 shadow-sm border border-gray-100';

    var bContent = document.createElement('div');
    bContent.className = 'bubble-content';

    var nameLine = document.createElement('div');
    nameLine.className = 'reply-name text-xs font-semibold mb-1 ' + (isMine ? 'text-white/70' : 'text-gray-500');
    nameLine.textContent = data.remitenteNombre || '';
    bContent.appendChild(nameLine);

    var p = document.createElement('p');
    p.className = 'whitespace-pre-wrap text-sm leading-relaxed';
    p.textContent = data.contenido || '';
    bContent.appendChild(p);

    if (data.archivos && data.archivos.length > 0) {
        var filesDiv = document.createElement('div');
        filesDiv.className = 'flex flex-col gap-2 mt-2 pt-2 border-t';
        filesDiv.style.borderTopColor = isMine ? 'rgba(255,255,255,0.2)' : '#e5e7eb';
        for (var ai = 0; ai < data.archivos.length; ai++) {
            var a = data.archivos[ai];
            filesDiv.insertAdjacentHTML('beforeend', renderArchivo(a, data.idMensaje));
        }
        bContent.appendChild(filesDiv);
    }

    var time = document.createElement('div');
    time.className = 'reply-time text-xs mt-2 ' + (isMine ? 'text-white/60 text-right' : 'text-gray-400 text-left');
    time.textContent = data.fechaEnvio || '';
    bContent.appendChild(time);

    inner.appendChild(bContent);
    wrapper.appendChild(inner);
    repliesContainer.appendChild(wrapper);

    // Attach preview listeners to new file buttons
    var newItems = wrapper.querySelectorAll('.preview-btn');
    for (var pbi = 0; pbi < newItems.length; pbi++) {
        (function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var parent = btn.closest('.archivo-item');
                if (!parent) return;
                var previewCont = parent.querySelector('.archivo-preview-cont');
                if (!previewCont) return;
                if (!previewCont.classList.contains('hidden')) {
                    previewCont.classList.add('hidden');
                    previewCont.innerHTML = '';
                    return;
                }
                var url = btn.getAttribute('data-url');
                var ext = btn.getAttribute('data-ext');
                if (ext === 'pdf') {
                    previewCont.innerHTML = '<embed src="' + url + '#toolbar=0" type="application/pdf" class="w-full h-[500px] rounded-xl border" />';
                    previewCont.classList.remove('hidden');
                } else if (ext === 'docx') {
                    previewCont.innerHTML = '<div class="flex items-center justify-center p-8"><i class="fas fa-spinner fa-spin text-2xl text-gray-400"></i></div>';
                    previewCont.classList.remove('hidden');
                    fetch(url)
                        .then(function(r) {
                            if (!r.ok) throw new Error('Error al cargar');
                            return r.arrayBuffer();
                        })
                        .then(function(buffer) {
                            mammoth.convertToHtml({arrayBuffer: buffer})
                                .then(function(result) {
                                    previewCont.innerHTML = '<div class="p-6 bg-white rounded-xl border prose prose-sm max-w-none">' + result.value + '</div>';
                                })
                                .catch(function() {
                                    previewCont.innerHTML = '<div class="p-4 text-red-500 text-sm">Error al procesar el documento.</div>';
                                });
                        })
                        .catch(function() {
                            previewCont.innerHTML = '<div class="p-4 text-red-500 text-sm">Error al cargar el archivo.</div>';
                        });
                } else if (['jpg','jpeg','png','gif','bmp','webp'].indexOf(ext) !== -1) {
                    previewCont.innerHTML = '<img src="' + url + '" class="max-h-96 w-full object-contain rounded-xl border" alt="Preview" />';
                    previewCont.classList.remove('hidden');
                } else {
                    previewCont.innerHTML = '<div class="p-4 text-gray-500 text-sm text-center"><i class="fas fa-file mr-2"></i>Vista previa no disponible</div>';
                    previewCont.classList.remove('hidden');
                }
            });
        })(newItems[pbi]);
    }

    repliesContainer.scrollTop = repliesContainer.scrollHeight;
}

function toggleMinimized(el) {
    var parent = el.closest('[class*="flex justify-"]') || el.closest('.respuesta-item');
    if (!parent) return;
    parent.classList.toggle('minimized');
    var content = parent.querySelector('.bubble-content');
    if (content) {
        content.style.display = parent.classList.contains('minimized') ? 'none' : '';
    }
    var summary = parent.querySelector('.bubble-summary');
    if (summary) {
        summary.style.display = parent.classList.contains('minimized') ? '' : 'none';
    }
}

function expandAllThread(id) {
    var tc = document.getElementById('threadContainer-' + id);
    if (!tc) return;
    var space = tc.querySelector('.space-y-3');
    if (space) {
        space.style.display = '';
        var items = space.querySelectorAll('.respuesta-item');
        for (var i = 0; i < items.length; i++) {
            items[i].style.display = '';
        }
    }
    var btn = tc.querySelector('.show-more-thread');
    if (btn) {
        var parentDiv = btn.closest('[class*="text-xs text-gray-400"]');
        if (parentDiv) parentDiv.remove();
    }
    tc.classList.remove('compacted');
}

document.querySelectorAll('.abrir-msj').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        var to = this.getAttribute('data-to');
        var asunto = this.getAttribute('data-asunto');
        var cont = document.getElementById('msj-' + id);
        if (!cont) return;
        if (!cont.classList.contains('hidden')) {
            cont.classList.add('hidden');
            cont.innerHTML = '';
            this.innerHTML = '<i class="fas fa-chevron-down"></i>';
            return;
        }
        fetch('/mensajes/ver/' + id)
            .then(function(response) {
                if (!response.ok) {
                    return response.text().then(function(t) { throw new Error(t || 'Error al obtener el mensaje'); });
                }
                return response.json();
            })
            .then(function(data) {
                var currentUserId = parseInt(document.getElementById('currentUserId').value);
                var otherUserId = data.remitente && data.remitente.idUsuario === currentUserId
                    ? (data.destinatario ? data.destinatario.idUsuario : '')
                    : (data.remitente ? data.remitente.idUsuario : '');

                var html = '<div class="px-6 py-5 bg-gray-50">' +
                    '<div class="flex items-center gap-2 text-sm text-gray-600 mb-3">' +
                    '<i class="fas fa-user-circle text-gray-400"></i>' +
                    (data.remitente && data.remitente.idUsuario === currentUserId
                        ? '<strong>Para:</strong> ' + (data.destinatario ? (data.destinatario.rol + ' - ' + data.destinatario.nombreCompleto || '') : '')
                        : '<strong>De:</strong> ' + (data.remitente != null ? (data.remitente.rol + ' - ' + data.remitente.nombreCompleto || '') : '')) +
                    '</div>' +
                    '<p class="font-bold text-gray-800 text-lg mb-3">' + (data.asunto || '') + '</p>' +
                    '<div class="bg-white rounded-xl p-4 border border-gray-200">' +
                    '<p class="whitespace-pre-wrap text-gray-700 leading-relaxed">' + (data.contenido || '') + '</p>' +
                    '</div>';

                if (data.archivos && data.archivos.length > 0) {
                    html += '<div class="mt-4 pt-4 border-t border-gray-200">' +
                        '<p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Archivos adjuntos (' + data.archivos.length + ')</p>' +
                        '<div class="flex flex-col gap-3">';
                    for (var ai = 0; ai < data.archivos.length; ai++) {
                        html += renderArchivo(data.archivos[ai], data.idMensaje);
                    }
                    html += '</div></div>';
                }

                if (data.respuestas && data.respuestas.length > 0) {
                    html += '<div class="mt-4 pt-4 border-t border-gray-200" id="threadContainer-' + id + '">' +
                        '<p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3"><i class="fas fa-reply-all mr-1"></i>Respuestas (' + data.respuestas.length + ')</p>' +
                        '<div class="space-y-3">';
                    var showFrom = Math.max(0, data.respuestas.length - 1);
                    for (var ri = 0; ri < data.respuestas.length; ri++) {
                        var r = data.respuestas[ri];
                        var isMine = r.remitenteId === currentUserId;
                        var isHidden = ri < showFrom;
                        var rClass = 'rounded-xl px-4 py-3 border text-sm ' + (isMine ? 'bg-[#a03030]/5 border-[#a03030]/20 ml-8' : 'bg-gray-50 border-gray-200 mr-8');
                        var hiddenStyle = isHidden ? ' style="display:none"' : '';
                        html += '<div class="respuesta-item ' + rClass + '" data-idx="' + ri + '"' + hiddenStyle + '>' +
                            '<div class="flex items-center gap-2 text-xs text-gray-500 mb-1">' +
                            '<i class="fas fa-user-circle"></i><strong>' + (r.remitenteNombre || '') + '</strong>' +
                            '<span class="ml-auto">' + (r.fechaEnvio || '') + '</span></div>' +
                            '<p class="whitespace-pre-wrap text-gray-700">' + (r.contenido || '') + '</p>';
                        if (r.archivos && r.archivos.length > 0) {
                            html += '<div class="mt-2 flex flex-wrap gap-2">';
                            for (var rai = 0; rai < r.archivos.length; rai++) {
                                var ra = r.archivos[rai];
                                var raExt = ra.archivoNombre.split('.').pop().toLowerCase();
                                var raIcon = ['jpg','jpeg','png','gif','bmp','webp'].indexOf(raExt) !== -1 ? 'fa-image text-blue-500' : raExt === 'pdf' ? 'fa-file-pdf text-red-500' : (raExt === 'docx' || raExt === 'doc') ? 'fa-file-word text-blue-600' : 'fa-file text-yellow-500';
                                html += '<a href="/mensajes/descargarArchivo/' + ra.idArchivo + '" class="flex items-center gap-1.5 text-xs bg-white rounded-lg border border-gray-200 px-3 py-1.5 hover:bg-gray-50 transition" title="' + ra.archivoNombre + '"><i class="fas ' + raIcon + '"></i><span class="truncate max-w-[80px]">' + ra.archivoNombre + '</span><i class="fas fa-download text-gray-400"></i></a>';
                            }
                            html += '</div>';
                        }
                        html += '</div>';
                    }
                    if (showFrom > 0) {
                        html += '<button class="ver-mas-respuestas text-xs text-[#a03030] font-bold hover:underline flex items-center gap-1" data-id="' + id + '" data-total="' + data.respuestas.length + '" data-showfrom="' + showFrom + '"><i class="fas fa-chevron-up"></i> Ver ' + showFrom + ' respuestas anteriores</button>';
                    }
                    html += '</div></div>';
                }

                if (data.destinatario && data.destinatario.idUsuario === currentUserId) {
                    html += renderReplyForm(id, data.remitente ? data.remitente.idUsuario : '', 'Re: ' + (data.asunto || ''));
                } else if (data.remitente && data.remitente.idUsuario === currentUserId) {
                    html += renderReplyForm(id, data.destinatario ? data.destinatario.idUsuario : '', 'Re: ' + (data.asunto || ''));
                } else if (otherUserId) {
                    html += '<div class="mt-4 pt-4 border-t border-gray-200">' +
                        '<a href="/mensajes/chat/' + otherUserId + '" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-sm">' +
                        '<i class="fas fa-comments mr-2"></i>Chat</a></div>';
                }

                html += '</div>';
                cont.innerHTML = html;
                cont.classList.remove('hidden');
                this.innerHTML = '<i class="fas fa-chevron-up"></i>';

                cont.querySelectorAll('.preview-btn').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var parent = this.closest('.archivo-item');
                        var previewCont = parent.querySelector('.archivo-preview-cont');
                        if (!previewCont.classList.contains('hidden')) {
                            previewCont.classList.add('hidden');
                            previewCont.innerHTML = '';
                            return;
                        }
                        var url = this.getAttribute('data-url');
                        var ext = this.getAttribute('data-ext');
                        if (ext === 'pdf') {
                            previewCont.innerHTML = '<embed src="' + url + '#toolbar=0" type="application/pdf" class="w-full h-[500px] rounded-xl border" />';
                            previewCont.classList.remove('hidden');
                        } else if (ext === 'docx') {
                            previewCont.innerHTML = '<div class="flex items-center justify-center p-8"><i class="fas fa-spinner fa-spin text-2xl text-gray-400"></i></div>';
                            previewCont.classList.remove('hidden');
                            fetch(url)
                                .then(function(r) {
                                    if (!r.ok) throw new Error('Error al cargar');
                                    return r.arrayBuffer();
                                })
                                .then(function(buffer) {
                                    mammoth.convertToHtml({arrayBuffer: buffer})
                                        .then(function(result) {
                                            previewCont.innerHTML = '<div class="rounded-xl border border-gray-200 p-6 bg-white max-h-[500px] overflow-y-auto text-sm leading-relaxed">' + result.value + '</div>';
                                        })
                                        .catch(function() {
                                            previewCont.innerHTML = '<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-6 text-center"><i class="fas fa-exclamation-triangle text-yellow-500 text-2xl mb-2"></i><p class="text-sm text-yellow-700">No se pudo renderizar el documento.</p><a href="/mensajes/descargarArchivo/' + this.getAttribute('data-archivoid') + '" class="text-xs text-blue-600 underline mt-2 inline-block">Descargar para verlo</a></div>';
                                        });
                                })
                                .catch(function() {
                                    previewCont.innerHTML = '<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-6 text-center"><i class="fas fa-exclamation-triangle text-yellow-500 text-2xl mb-2"></i><p class="text-sm text-yellow-700">Error al cargar el documento.</p></div>';
                                });
                        } else if (ext === 'doc') {
                            previewCont.innerHTML = '<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-6 text-center"><i class="fas fa-file-word text-blue-500 text-3xl mb-2"></i><p class="text-sm text-gray-600 mb-3">Vista previa no disponible para documentos .doc. Descargue el archivo para verlo.</p><a href="/mensajes/descargarArchivo/' + (btn.getAttribute('data-archivoid') || url.split('/').pop()) + '" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition inline-flex items-center gap-2"><i class="fas fa-download"></i>Descargar</a></div>';
                            previewCont.classList.remove('hidden');
                        } else {
                            previewCont.innerHTML = '<img src="' + url + '" class="w-full max-h-96 object-contain rounded-xl border" />';
                            previewCont.classList.remove('hidden');
                        }
                    });
                });

                var replySection = cont.querySelector('.reply-section');
                if (replySection) {
                    if (!window.replyFiles) window.replyFiles = {};
                    window.replyFiles[id] = [];

                    var fileInput = cont.querySelector('.reply-file-input');
                    if (fileInput) {
                        fileInput.addEventListener('change', function() {
                            var rid = this.getAttribute('data-id');
                            if (!window.replyFiles[rid]) window.replyFiles[rid] = [];
                            for (var fi = 0; fi < this.files.length; fi++) {
                                var f = this.files[fi];
                                var exists = window.replyFiles[rid].some(function(x) { return x.name === f.name && x.size === f.size && x.lastModified === f.lastModified; });
                                if (!exists) window.replyFiles[rid].push(f);
                            }
                            this.value = '';
                            renderReplyFilePreviews(rid);
                        });
                    }

                    function renderReplyFilePreviews(rid) {
                        var container = document.getElementById('replyFilePreviews-' + rid);
                        if (!container) return;
                        container.innerHTML = '';
                        var files = window.replyFiles[rid] || [];
                        for (var fi = 0; fi < files.length; fi++) {
                            var f = files[fi];
                            var isImg = f.type.startsWith('image/');
                            var isPdf = f.name.toLowerCase().endsWith('.pdf');
                            var icon = isImg ? 'fa-image text-blue-500' : isPdf ? 'fa-file-pdf text-red-500' : 'fa-file text-yellow-500';
                            var sz = (f.size / 1024).toFixed(1) + ' KB';
                            var chip = document.createElement('div');
                            chip.className = 'flex items-center gap-1.5 bg-gray-50 border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs';
                            chip.innerHTML = '<i class="fas ' + icon + '"></i><span class="truncate max-w-[80px]">' + f.name + '</span><span class="text-gray-400">' + sz + '</span><button type="button" onclick="removeReplyFile(' + rid + ', ' + fi + ')" class="w-3.5 h-3.5 rounded-full bg-red-100 text-red-500 flex items-center justify-center hover:bg-red-200 transition"><i class="fas fa-times" style="font-size:8px"></i></button>';
                            container.appendChild(chip);
                        }
                    }

                    var sendBtn = cont.querySelector('.send-reply-btn');
                    if (sendBtn) {
                        sendBtn.addEventListener('click', function() {
                            var rid = this.getAttribute('data-id');
                            var toId = this.getAttribute('data-to');
                            var asuntoVal = this.getAttribute('data-asunto');
                            var input = document.getElementById('replyInput-' + rid);
                            var errorDiv = document.getElementById('replyError-' + rid);
                            var errorMsg = errorDiv ? errorDiv.querySelector('.reply-error-msg') : null;
                            if (errorDiv) errorDiv.classList.add('hidden');
                            var text = input ? input.value.trim() : '';
                            var files = window.replyFiles[rid] || [];
                            if (!text && files.length === 0) return;

                            var totalSize = 0;
                            for (var fi = 0; fi < files.length; fi++) {
                                totalSize += files[fi].size;
                            }
                            if (totalSize > 20 * 1024 * 1024) {
                                if (errorMsg) errorMsg.textContent = 'El tamaÃ±o total supera los 20 MB.';
                                if (errorDiv) errorDiv.classList.remove('hidden');
                                return;
                            }

                            var fd = new FormData();
                            fd.append('destinatario.idUsuario', toId);
                            fd.append('asunto', asuntoVal);
                            fd.append('contenido', text);
                            fd.append('replyToId', rid);
                            for (var fi = 0; fi < files.length; fi++) {
                                fd.append('files', files[fi]);
                            }

                            var btnEl = this;
                            btnEl.disabled = true;
                            btnEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                            fetch('/mensajes/enviar', {
                                method: 'POST',
                                body: fd,
                                headers: { 'X-Requested-With': 'XMLHttpRequest' }
                            })
                            .then(function(r) {
                                if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Error al enviar'); });
                                return r.json();
                            })
                            .then(function(data) {
                                appendReplyBubble(data, rid);
                                if (input) input.value = '';
                                window.replyFiles[rid] = [];
                                renderReplyFilePreviews(rid);
                            })
                            .catch(function(err) {
                                if (errorMsg) errorMsg.textContent = err.message || 'Error al enviar la respuesta';
                                if (errorDiv) errorDiv.classList.remove('hidden');
                            })
                            .finally(function() {
                                btnEl.disabled = false;
                                btnEl.innerHTML = '<i class="fas fa-paper-plane text-xs"></i> Enviar';
                            });
                        });
                    }
                }

                var verMasBtn = cont.querySelector('.ver-mas-respuestas');
                if (verMasBtn) {
                    verMasBtn.addEventListener('click', function() {
                        var threadId = this.getAttribute('data-id');
                        var showFrom = parseInt(this.getAttribute('data-showfrom'));
                        var container = document.getElementById('threadContainer-' + threadId);
                        if (!container) return;
                        var items = container.querySelectorAll('.respuesta-item');
                        var hiddenCount = 0;
                        for (var vi = 0; vi < items.length; vi++) {
                            var idx = parseInt(items[vi].getAttribute('data-idx'));
                            if (idx < showFrom) {
                                items[vi].style.display = '';
                                hiddenCount++;
                            }
                        }
                        this.remove();
                    });
                }
            }).catch(function(err) { alert('No se pudo obtener el mensaje: ' + (err.message || err)); });
    });
});

function removeReplyFile(rid, idx) {
    if (window.replyFiles && window.replyFiles[rid]) {
        window.replyFiles[rid].splice(idx, 1);
        var container = document.getElementById('replyFilePreviews-' + rid);
        if (container) {
            container.innerHTML = '';
            var files = window.replyFiles[rid] || [];
            for (var fi = 0; fi < files.length; fi++) {
                var f = files[fi];
                var isImg = f.type.startsWith('image/');
                var isPdf = f.name.toLowerCase().endsWith('.pdf');
                var icon = isImg ? 'fa-image text-blue-500' : isPdf ? 'fa-file-pdf text-red-500' : 'fa-file text-yellow-500';
                var sz = (f.size / 1024).toFixed(1) + ' KB';
                var chip = document.createElement('div');
                chip.className = 'flex items-center gap-1.5 bg-gray-50 border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs';
                chip.innerHTML = '<i class="fas ' + icon + '"></i><span class="truncate max-w-[80px]">' + f.name + '</span><span class="text-gray-400">' + sz + '</span><button type="button" onclick="removeReplyFile(' + rid + ', ' + fi + ')" class="w-3.5 h-3.5 rounded-full bg-red-100 text-red-500 flex items-center justify-center hover:bg-red-200 transition"><i class="fas fa-times" style="font-size:8px"></i></button>';
                container.appendChild(chip);
            }
        }
    }
}
</script>
</body>
</html>
