<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Gestión de Evaluaciones y Notas')}"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-gradient-to-r from-[#a03030] to-[#7d1f1f] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Evaluaciones y Notas</h1>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <div class="flex items-center justify-between mb-6">
                    <p class="text-gray-600">Califica a tus estudiantes por bimestre</p>
                </div>

                <!-- Messages -->
                <div th:if="${session.mensajeExito}" class="mb-6 bg-green-50 border border-green-200 text-green-800 px-5 py-3 rounded-xl flex items-center gap-3">
                    <i class="fas fa-check-circle text-green-500"></i>
                    <span class="font-medium" th:text="${session.mensajeExito}"></span>
                </div>
                <div th:if="${session.mensajeError}" class="mb-6 bg-red-50 border border-red-200 text-red-800 px-5 py-3 rounded-xl flex items-center gap-3">
                    <i class="fas fa-exclamation-circle text-red-500"></i>
                    <span class="font-medium" th:text="${session.mensajeError}"></span>
                </div>

                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(horarios)}" class="bg-blue-50 border border-blue-200 text-blue-800 px-6 py-10 rounded-2xl text-center">
                    <i class="fas fa-info-circle text-4xl mb-4"></i>
                    <p class="text-lg font-medium">No tienes horarios asignados</p>
                    <p class="text-sm mt-2">Contacta con administración para asignar tus horarios</p>
                </div>

                <!-- Table -->
                <div th:if="${!#lists.isEmpty(horarios)}" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-800 text-white">
                                <tr>
                                    <th class="px-6 py-4 text-left font-semibold text-xs uppercase tracking-wider">#</th>
                                    <th class="px-6 py-4 text-left font-semibold text-xs uppercase tracking-wider">Día</th>
                                    <th class="px-6 py-4 text-left font-semibold text-xs uppercase tracking-wider">Horario</th>
                                    <th class="px-6 py-4 text-left font-semibold text-xs uppercase tracking-wider">Aula</th>
                                    <th class="px-6 py-4 text-left font-semibold text-xs uppercase tracking-wider">Curso</th>
                                    <th class="px-6 py-4 text-center font-semibold text-xs uppercase tracking-wider">Bimestres</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="h, iter : ${horarios}" class="border-t border-gray-100 hover:bg-gray-50/50 transition">
                                    <td class="px-6 py-4 font-bold text-gray-400 text-xs" th:text="${iter.count}"></td>
                                    <td class="px-6 py-4">
                                        <span class="inline-flex items-center px-3 py-1 rounded-lg text-xs font-bold bg-purple-50 text-purple-700" th:text="${h.diaSemana}"></span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <span class="text-sm font-medium text-gray-700">
                                            <span th:text="${h.horaInicio != null ? h.horaInicio.format(T(java.time.format.DateTimeFormatter).ofPattern('HH:mm')) : 'N/A'}"></span>
                                            - <span th:text="${h.horaFin != null ? h.horaFin.format(T(java.time.format.DateTimeFormatter).ofPattern('HH:mm')) : 'N/A'}"></span>
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 font-medium text-gray-800" th:text="${h.aula != null ? (h.aula.grado + ' - ' + h.aula.seccion) : 'N/A'}"></td>
                                    <td class="px-6 py-4 font-semibold text-gray-800" th:text="${h.curso != null ? h.curso.nombreCurso : 'N/A'}"></td>
                                    <td class="px-6 py-4">
                                        <div class="flex justify-center gap-1.5">
                                            <a th:href="@{/docente/evaluaciones/abrir/{id}(id=${h.idHorario}, bimestre=1, escala='DECIMAL')}" 
                                               class="inline-flex items-center px-3 py-1.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-lg font-bold text-xs transition"
                                               title="Bimestre 1 - Decimal">
                                                B1
                                            </a>
                                            <a th:href="@{/docente/evaluaciones/abrir/{id}(id=${h.idHorario}, bimestre=2, escala='DECIMAL')}" 
                                               class="inline-flex items-center px-3 py-1.5 bg-green-50 text-green-700 hover:bg-green-100 rounded-lg font-bold text-xs transition"
                                               title="Bimestre 2 - Decimal">
                                                B2
                                            </a>
                                            <a th:href="@{/docente/evaluaciones/abrir/{id}(id=${h.idHorario}, bimestre=3, escala='DECIMAL')}" 
                                               class="inline-flex items-center px-3 py-1.5 bg-yellow-50 text-yellow-700 hover:bg-yellow-100 rounded-lg font-bold text-xs transition"
                                               title="Bimestre 3 - Decimal">
                                                B3
                                            </a>
                                            <a th:href="@{/docente/evaluaciones/abrir/{id}(id=${h.idHorario}, bimestre=4, escala='DECIMAL')}" 
                                               class="inline-flex items-center px-3 py-1.5 bg-red-50 text-red-700 hover:bg-red-100 rounded-lg font-bold text-xs transition"
                                               title="Bimestre 4 - Decimal">
                                                B4
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
