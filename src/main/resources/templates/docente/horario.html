<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Mi Horario - Docente')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#a03030] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Mi Horario</h1>
            <div th:if="${horarioMatriz != null}" class="flex gap-3">
                <button onclick="window.print()" class="px-4 py-2 bg-red-700 hover:bg-red-800 rounded-lg text-sm font-semibold transition-all">
                    <i class="fas fa-print mr-1"></i> Imprimir
                </button>
                <a th:href="'/docente/horario/descargar?idAula=' + ${aulaSeleccionada}" class="px-4 py-2 bg-white text-[#e60000] hover:bg-gray-100 rounded-lg text-sm font-semibold transition-all">
                    <i class="fas fa-download mr-1"></i> PDF
                </a>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <p class="text-gray-500 font-medium mb-6" th:text="${horarioMatriz != null ? horarioMatriz.aulaNombre : 'Tu programa semanal'}"></p>

                <!-- Aula Selector -->
                <div class="mb-6 bg-white rounded-lg shadow-sm p-6 border border-gray-100">
                    <label for="aulaSelect" class="block text-sm font-semibold text-gray-700 mb-3">Seleccionar Aula</label>
                    <form method="get" action="/docente/horario" class="flex gap-3">
                        <select id="aulaSelect" name="idAula" onchange="this.form.submit()" 
                                class="flex-1 px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-[#e60000] focus:outline-none font-semibold cursor-pointer">
                            <option th:each="aula : ${aulas}" 
                                    th:value="${aula.idAula}"
                                    th:text="${aula.nombre}"
                                    th:selected="${aula.idAula == aulaSeleccionada}"></option>
                        </select>
                    </form>
                </div>

                <!-- Empty State -->
                <div th:if="${horarioMatriz == null}" class="p-12 text-center text-gray-400 bg-white rounded-2xl border border-gray-100">
                    <i class="fas fa-calendar-times text-4xl mb-4"></i>
                    <p>No se encontraron horarios disponibles.</p>
                </div>

                <!-- Matriz Table -->
                <div th:if="${horarioMatriz != null}" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full border-collapse text-sm">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-6 py-4 text-center font-bold text-gray-600">Hora</th>
                                    <th class="px-6 py-4 text-center font-bold text-gray-600">Lunes</th>
                                    <th class="px-6 py-4 text-center font-bold text-gray-600">Martes</th>
                                    <th class="px-6 py-4 text-center font-bold text-gray-600">Miércoles</th>
                                    <th class="px-6 py-4 text-center font-bold text-gray-600">Jueves</th>
                                    <th class="px-6 py-4 text-center font-bold text-gray-600">Viernes</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr th:each="hora : ${horarioMatriz.horas}">
                                    <td class="px-6 py-4 text-center font-bold text-gray-700 bg-gray-50" th:text="${#temporals.format(hora, 'HH:mm')}"></td>
                                    
                                    <td class="px-3 py-2" th:each="dia : ${ {'Lunes', 'Martes', 'Miercoles', 'Jueves', 'Viernes'} }">
                                        <div th:if="${horarioMatriz.obtenerHorario(hora, dia) != null}" 
                                             class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm hover:border-[#e60000]/30 transition-all">
                                            <div class="font-bold text-gray-800 text-xs truncate" th:text="${horarioMatriz.obtenerHorario(hora, dia).cursoNombre}"></div>
                                            <div class="text-[10px] text-gray-500 mt-1 truncate" th:text="${horarioMatriz.obtenerHorario(hora, dia).docenteNombre}"></div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Print Styles -->
                <style media="print">
                    @media print {
                        .no-print { display: none !important; }
                        body { background: white !important; }
                        main { max-width: 100% !important; padding: 0 !important; }
                        table { border-collapse: collapse; width: 100%; }
                        td, th { border: 1px solid #333; padding: 10px; }
                    }
                </style>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
