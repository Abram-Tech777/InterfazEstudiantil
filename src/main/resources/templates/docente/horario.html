<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Mi Horario - Docente')}"></head>
<body class="m-0 p-0 h-screen flex bg-gradient-to-br from-gray-50 to-gray-100 font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-gradient-to-r from-[#8b1a1a] to-[#a03030] shadow-lg px-8 flex items-center justify-between z-10 text-white">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold tracking-tight">Mi Horario</h1>
                <span class="hidden md:inline-block px-3 py-1 bg-white/15 rounded-full text-xs font-medium" th:text="${docenteNombre}"></span>
            </div>
            <div th:if="${horarioMatriz != null}" class="flex gap-2">
                <button onclick="window.print()" class="no-print px-4 py-2 bg-white/10 hover:bg-white/20 backdrop-blur-sm rounded-lg text-sm font-semibold transition-all">
                    <i class="fas fa-print mr-1"></i> Imprimir
                </button>
                <a th:href="'/docente/horario/descargar?idAula=' + ${aulaSeleccionada} + '&amp;filtro=' + ${filtro}" class="no-print px-4 py-2 bg-white text-[#8b1a1a] hover:bg-gray-100 rounded-lg text-sm font-semibold transition-all">
                    <i class="fas fa-download mr-1"></i> PDF
                </a>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-8 custom-scrollbar">
            <div class="max-w-7xl mx-auto space-y-6">

                <!-- Header Info -->
                <div th:if="${horarioMatriz != null}" class="flex items-center justify-between">
                    <div>
                        <h2 class="text-lg font-bold text-gray-800" th:text="${horarioMatriz.aulaNombre}"></h2>
                        <p class="text-sm text-gray-500 flex items-center gap-2 mt-1">
                            <i class="far fa-clock"></i>
                            Jornada: <span class="font-medium" th:text="${jornadaInicio}"></span> - <span class="font-medium" th:text="${jornadaFin}"></span>
                        </p>
                    </div>
                </div>

                <!-- Aula Selector + Filter -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 no-print">
                    <form method="get" action="/docente/horario" class="flex flex-wrap items-end gap-4">
                        <div class="flex-1 min-w-[200px]">
                            <label for="aulaSelect" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                                <i class="fas fa-school mr-1"></i> Aula
                            </label>
                            <select id="aulaSelect" name="idAula" onchange="cambiarFiltroHorario()"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#a03030]/20 focus:border-[#a03030] outline-none font-medium cursor-pointer bg-gray-50 hover:bg-white transition-colors">
                                <option th:each="aula : ${aulas}"
                                        th:value="${aula.idAula}"
                                        th:text="${aula.nombre}"
                                        th:selected="${aula.idAula == aulaSeleccionada}"></option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[200px]">
                            <label for="filtroSelect" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                                <i class="fas fa-filter mr-1"></i> Vista
                            </label>
                            <select id="filtroSelect" name="filtro" onchange="cambiarFiltroHorario()"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#a03030]/20 focus:border-[#a03030] outline-none font-medium cursor-pointer bg-gray-50 hover:bg-white transition-colors">
                                <option value="propio" th:selected="${filtro == 'propio'}">Solo mi horario</option>
                                <option value="completo" th:selected="${filtro == 'completo'}">Horario completo del aula</option>
                            </select>
                        </div>
                    </form>
                </div>

                <!-- Empty State -->
                <div th:if="${horarioMatriz == null or horarioMatriz.filas.isEmpty()}" class="text-center py-16 bg-white rounded-2xl border border-gray-200 shadow-sm">
                    <i class="fas fa-calendar-times text-5xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500 text-lg font-medium">No se encontraron horarios disponibles</p>
                    <p class="text-gray-400 text-sm mt-1">Selecciona un aula para ver su horario</p>
                </div>

                <!-- Horario Table -->
                <div th:if="${horarioMatriz != null and !horarioMatriz.filas.isEmpty()}" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr class="bg-gradient-to-r from-gray-800 to-gray-700 text-white">
                                    <th class="px-4 py-3.5 text-center text-xs font-semibold uppercase tracking-wider w-32">Horario</th>
                                    <th class="px-3 py-3.5 text-center text-xs font-semibold uppercase tracking-wider" th:each="dia : ${horarioMatriz.dias}" th:text="${dia}">
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr th:each="fila : ${horarioMatriz.filas}">

                                    <!-- RECREO row (full width) -->
                                    <td th:if="${fila.recreo}" th:colspan="${#lists.size(horarioMatriz.dias) + 1}" class="px-6 py-4 text-center bg-gradient-to-r from-amber-50 via-yellow-50 to-amber-50">
                                        <div class="inline-flex items-center gap-3">
                                            <span class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center">
                                                <i class="fas fa-mug-hot text-amber-600 text-sm"></i>
                                            </span>
                                            <span class="text-amber-800 font-bold text-base">RECREO</span>
                                            <span class="text-amber-500 text-sm font-medium" th:text="${fila.horaInicio.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) + ' - ' + fila.horaFin.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a'))}"></span>
                                        </div>
                                    </td>

                                    <!-- Time column -->
                                    <td th:if="${!fila.recreo}" class="px-4 py-4 text-center align-top bg-gray-50/80">
                                        <div class="text-sm font-bold text-gray-700" th:text="${fila.horaInicio.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a'))}"></div>
                                        <div class="text-xs text-gray-400">a</div>
                                        <div class="text-sm font-bold text-gray-700" th:text="${fila.horaFin.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a'))}"></div>
                                    </td>

                                    <!-- Day columns -->
                                    <td th:if="${!fila.recreo}" th:each="dia : ${horarioMatriz.dias}" class="px-2 py-2 align-top">
                                        <div th:if="${fila.tieneHorario(dia)}" class="group relative">
                                            <div class="rounded-xl p-3 shadow-sm border border-gray-100 hover:shadow-md transition-all duration-200 min-h-[80px] cursor-default"
                                                 th:style="'border-left: 4px solid ' + ${fila.getHorario(dia).color} + '; background: linear-gradient(135deg, ' + ${fila.getHorario(dia).color} + '08, white)'">
                                                <div class="font-bold text-gray-800 text-sm leading-tight" th:text="${fila.getHorario(dia).cursoNombre}"></div>
                                                <div class="flex items-center gap-1 mt-1.5 text-[11px] text-gray-500">
                                                    <i class="fas fa-user-tie text-[10px]"></i>
                                                    <span th:text="${fila.getHorario(dia).docenteNombre}"></span>
                                                </div>
                                                <div class="mt-1">
                                                    <span th:if="${fila.getHorario(dia).tipo == null or fila.getHorario(dia).tipo == 'CLASE'}" class="inline-block px-1.5 py-0.5 rounded text-[10px] font-bold leading-tight bg-blue-100 text-blue-700">CLASE</span>
                                                    <span th:if="${fila.getHorario(dia).tipo == 'REFUERZO'}" class="inline-block px-1.5 py-0.5 rounded text-[10px] font-bold leading-tight bg-orange-100 text-orange-700">REFUERZO</span>
                                                    <span th:if="${fila.getHorario(dia).tipo == 'TALLER'}" class="inline-block px-1.5 py-0.5 rounded text-[10px] font-bold leading-tight bg-green-100 text-green-700">TALLER</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div th:if="${!fila.tieneHorario(dia)}" class="flex items-center justify-center h-full min-h-[80px]">
                                            <span class="text-gray-200 text-lg">—</span>
                                        </div>
                                    </td>

                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Legend -->
                <div th:if="${horarioMatriz != null and !horarioMatriz.filas.isEmpty()}" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Cursos</h3>
                    <div class="flex flex-wrap gap-3">
                        <div th:each="entry : ${cursosColores}" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-gray-50 border border-gray-100">
                            <span class="w-3 h-3 rounded-full flex-shrink-0" th:style="'background-color: ' + ${entry.value}"></span>
                            <span class="text-xs font-medium text-gray-700" th:text="${entry.key}"></span>
                        </div>
                    </div>
                </div>

                <style>
                    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
                    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
                    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
                    .print-only { display: none; }
                    @media print {
                        @page { size: landscape; margin: 0.8cm; }
                        .no-print { display: none !important; }
                        .print-only { display: block !important; }
                        body { background: white !important; margin: 0; padding: 0; }
                        body, .h-screen, .flex, .flex-1, main, .overflow-y-auto, .overflow-x-auto {
                            overflow: visible !important; max-height: none !important; height: auto !important; }
                        main { max-width: 100% !important; padding: 0 !important; }
                        table { width: 100% !important; font-size: 7.5pt; border-collapse: collapse; }
                        thead { display: table-header-group; }
                        tr { page-break-inside: avoid; }
                        td, th { border: 1px solid #ccc; padding: 3px 4px; }
                        .bg-gradient-to-r { background: #1f2937 !important; }
                        .bg-gradient-to-r th { color: white !important; }
                        .bg-gray-50\/80 { background: #f9fafb !important; }
                        .rounded-2xl { border-radius: 0 !important; box-shadow: none !important; }
                        .shadow-sm { box-shadow: none !important; }
                        .min-h-\[80px\] { min-height: 0 !important; }
                        .border-l-4 { border-left-width: 4px !important; }
                        h1 { font-size: 14pt !important; }
                        .text-2xl { font-size: 14pt !important; }
                        .text-lg { font-size: 11pt !important; }
                        .text-sm { font-size: 8pt !important; }
                        .text-xs { font-size: 7pt !important; }
                        .text-\[11px\] { font-size: 6.5pt !important; }
                        .text-\[10px\] { font-size: 6pt !important; }
                        p, .space-y-6 > * { margin: 0 0 4px 0 !important; }
                        .gap-4 { gap: 0 !important; }
                        .px-4 { padding-left: 2px !important; padding-right: 2px !important; }
                        .py-4 { padding-top: 2px !important; padding-bottom: 2px !important; }
                        .px-6 { padding-left: 3px !important; padding-right: 3px !important; }
                        .py-3\.5 { padding-top: 2px !important; padding-bottom: 2px !important; }
                        .w-32 { width: auto !important; min-width: 55px !important; }
                        .rounded-xl { border-radius: 2px !important; padding: 2px 3px !important; }
                    }
                </style>

            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
    <script>
        function cambiarFiltroHorario() {
            var form = document.querySelector('form[action="/docente/horario"]');
            if (!form) return;
            var selects = form.querySelectorAll('select[name]');
            var params = new URLSearchParams();
            selects.forEach(function(s) { params.set(s.name, s.value); });
            var url = form.getAttribute('action') + '?' + params.toString();
            if (url === window.location.href) return;

            var mainEl = document.querySelector('main');
            if (mainEl) mainEl.classList.add('loading');

            fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                .then(function(r) {
                    if (!r.ok) throw new Error();
                    return r.text();
                })
                .then(function(html) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var newMain = doc.querySelector('main');
                    var oldMain = document.querySelector('main');
                    if (newMain && oldMain) {
                        oldMain.outerHTML = newMain.outerHTML;
                    }
                    document.title = doc.title;
                })
                .catch(function() {
                    window.location.href = url;
                })
                .finally(function() {
                    var m = document.querySelector('main');
                    if (m) m.classList.remove('loading');
                });
        }

        document.addEventListener('submit', function(e) {
            var form = e.target.closest('form[action="/docente/horario"]');
            if (form) e.preventDefault();
        });
    </script>
</body>
</html>
