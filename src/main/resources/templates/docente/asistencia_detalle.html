<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Registro de Asistencia')}"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-gradient-to-r from-[#8b1a1a] to-[#a03030] shadow-lg px-8 flex items-center justify-between z-10 text-white">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold tracking-tight">Registro de Asistencia</h1>
                <span class="px-3 py-1 bg-white/15 rounded-full text-xs font-medium" th:text="${horario.diaSemana}"></span>
                <span class="text-sm"><i class="far fa-clock mr-1"></i><span th:text="${horario.horaInicio}"></span></span>
            </div>
            <a th:href="@{/docente/asistencia}" class="no-print px-4 py-2 bg-white/10 hover:bg-white/20 backdrop-blur-sm rounded-lg text-sm font-semibold transition-all">
                <i class="fas fa-arrow-left mr-1"></i> Volver
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <form th:action="@{/docente/asistencia/guardar}" method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <input type="hidden" name="idHorario" th:value="${horario.idHorario}" />

                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-gray-700">
                            <thead>
                                <tr class="bg-gradient-to-r from-gray-800 to-gray-700 text-white">
                                    <th class="px-6 py-4 text-left font-semibold text-xs uppercase tracking-wider w-16">#</th>
                                    <th class="px-6 py-4 text-left font-semibold text-xs uppercase tracking-wider">Alumno</th>
                                    <th class="px-6 py-4 text-center font-semibold text-xs uppercase tracking-wider">Estado</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr th:each="a, iter : ${alumnos}" class="hover:bg-gray-50/50 transition">
                                    <td class="px-6 py-4 font-bold text-gray-400" th:text="${iter.count}"></td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#a03030] to-[#7d1f1f] flex items-center justify-center text-white font-bold text-sm shadow-sm">
                                                <span th:text="${#strings.substring(a.nombreCompleto, 0, 1)}"></span>
                                            </div>
                                            <span class="font-medium text-gray-800" th:text="${a.nombreCompleto}"></span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <div class="inline-flex rounded-xl border border-gray-200 overflow-hidden" role="group">
                                            <label class="px-4 py-2 text-sm font-semibold cursor-pointer transition-all hover:bg-green-50 has-[:checked]:bg-green-500 has-[:checked]:text-white has-[:checked]:shadow-sm border-r border-gray-200">
                                                <input type="radio" th:name="${'estado_' + a.idAlumno}" value="PRESENTE" class="hidden"
                                                       th:checked="${estadosGuardados != null and estadosGuardados.get(a.idAlumno) == 'PRESENTE'}">
                                                <i class="fas fa-check-circle mr-1.5"></i>Presente
                                            </label>
                                            <label class="px-4 py-2 text-sm font-semibold cursor-pointer transition-all hover:bg-yellow-50 has-[:checked]:bg-yellow-500 has-[:checked]:text-white has-[:checked]:shadow-sm border-r border-gray-200">
                                                <input type="radio" th:name="${'estado_' + a.idAlumno}" value="RETARDO" class="hidden"
                                                       th:checked="${estadosGuardados != null and estadosGuardados.get(a.idAlumno) == 'RETARDO'}">
                                                <i class="fas fa-clock mr-1.5"></i>Tarde
                                            </label>
                                            <label class="px-4 py-2 text-sm font-semibold cursor-pointer transition-all hover:bg-red-50 has-[:checked]:bg-red-500 has-[:checked]:text-white has-[:checked]:shadow-sm">
                                                <input type="radio" th:name="${'estado_' + a.idAlumno}" value="AUSENCIA" class="hidden"
                                                       th:checked="${estadosGuardados != null and estadosGuardados.get(a.idAlumno) == 'AUSENCIA'}">
                                                <i class="fas fa-times-circle mr-1.5"></i>Falta
                                            </label>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex gap-3">
                        <button type="submit" class="flex items-center gap-2 px-6 py-2.5 bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white font-semibold rounded-xl transition-all shadow-sm">
                            <i class="fas fa-save"></i> Guardar Asistencia
                        </button>
                        <a th:href="@{/docente/asistencia}" class="flex items-center gap-2 px-6 py-2.5 border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold rounded-xl transition-all">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
