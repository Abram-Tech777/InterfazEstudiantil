<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Registro de Asistencia')"></head>
<body class="bg-gray-50 m-0 p-0 min-h-screen flex flex-col">

    <div th:replace="fragments/menu :: menu"></div>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Registro de Asistencia</h1>
            <div class="flex items-center mt-2 space-x-4">
                <span class="badge-status bg-purple-100 text-purple-700 font-semibold" th:text="${horario.diaSemana}"></span>
                <span class="text-gray-600">
                    <i class="fas fa-clock mr-1"></i>
                    <span th:text="${horario.horaInicio}"></span>
                </span>
            </div>
        </div>

        <!-- Form -->
        <form th:action="@{/docente/asistencia/guardar}" method="post" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <input type="hidden" name="idHorario" th:value="${horario.idHorario}" />
            
            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-gray-700">
                    <thead class="bg-gray-800 text-white sticky top-0">
                        <tr>
                            <th class="px-6 py-4 text-left font-semibold">#</th>
                            <th class="px-6 py-4 text-left font-semibold">Alumno</th>
                            <th class="px-6 py-4 text-left font-semibold">Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a, iter : ${alumnos}" class="border-t hover:bg-gray-50 transition">
                            <td class="px-6 py-4 font-bold text-gray-900" th:text="${iter.count}"></td>
                            <td class="px-6 py-4 font-medium text-gray-800" th:text="${a.nombreCompleto}"></td>
                            <td class="px-6 py-4">
                                <select th:name="${'estado_' + a.idAlumno}" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition">
                                    <option value="">-- Seleccionar --</option>
                                    <option value="ASISTIO">
                                        <i class="fas fa-check-circle"></i>Asistió
                                    </option>
                                    <option value="TARDE">
                                        <i class="fas fa-clock"></i>Tarde
                                    </option>
                                    <option value="FALTA">
                                        <i class="fas fa-times-circle"></i>Falta
                                    </option>
                                </select>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Buttons -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex gap-3">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded-lg transition flex items-center">
                    <i class="fas fa-save mr-2"></i>Guardar Asistencia
                </button>
                <a th:href="@{/docente/asistencia}" class="border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium py-2 px-6 rounded-lg transition flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i>Volver
                </a>
            </div>
        </form>
    </main>

    <div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
