<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Formulario Horario')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#a03030] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold" th:text="${horario.idHorario == 0 ? 'Registrar Horario' : 'Editar Horario'}"></h1>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-4xl mx-auto">
                <p class="text-gray-600 mb-6">GestiÃ³n de horarios de clases</p>

                
                <div th:if="${mensajeError}" class="mb-6 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-exclamation-circle mr-3 mt-1 text-red-600"></i>
                    <span th:text="${mensajeError}"></span>
                </div>

                
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden max-w-2xl">
                    <div class="bg-gradient-to-r from-cyan-50 to-cyan-100 px-6 py-4 border-b border-gray-200">
                        <h2 class="text-xl font-bold text-gray-900">
                            <i class="fas fa-calendar-alt mr-2 text-cyan-600"></i>
                            <span th:text="${horario.idHorario == 0 ? 'Nuevo Horario' : 'Editar Horario'}"></span>
                        </h2>
                    </div>

                    <form id="formHorario" th:action="@{/gestionarhorarios/guardar}" th:object="${horario}" method="post" class="p-8">
                        <input type="hidden" th:field="*{idHorario}" />

                        
                        <div class="mb-8">
                            <label class="block text-sm font-bold text-gray-900 mb-2">Aula</label>
                            <select th:field="*{aula.idAula}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" required>
                                <option value="0">-- Seleccione Aula --</option>
                                <option th:each="a : ${aulas}" th:value="${a.idAula}" th:text="${a.grado + ' - SecciÃ³n ' + a.seccion}"></option>
                            </select>
                        </div>

                        
                        <div class="mb-8">
                            <label class="block text-sm font-bold text-gray-900 mb-2">Docente</label>
                            <select th:field="*{idDocente}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" required>
                                <option value="0">-- Seleccione Docente --</option>
                                <option th:each="d : ${docentes}"
                                        th:value="${d.idDocente}"
                                        th:text="${d.nombre + ' ' + d.apellido}"></option>
                            </select>
                        </div>

                        
                        <div class="mb-8">
                            <label class="block text-sm font-bold text-gray-900 mb-2">Curso</label>
                            <select th:field="*{idCurso}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" required>
                                <option value="0">-- Seleccione Curso --</option>
                                <option th:each="c : ${cursos}" th:value="${c.idCurso}" th:text="${c.nombreCurso}"></option>
                            </select>
                        </div>

                        
                        <div class="mb-8">
                            <label class="block text-sm font-bold text-gray-900 mb-2">DÃ­a de la Semana</label>
                            <select th:field="*{diaSemana}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" required>
                                <option value="">-- Seleccione DÃ­a --</option>
                                <option th:each="d : ${dias}" th:value="${d}" th:text="${d}"></option>
                            </select>
                        </div>

                        
                        <div class="mb-8">
                            <label class="block text-sm font-bold text-gray-900 mb-2">Tipo</label>
                            <select th:field="*{tipo}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition">
                                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                            </select>
                            <p class="text-xs text-gray-500 mt-1">CLASE: regular, REFUERZO: semanal, TALLER: todo el aÃ±o</p>
                        </div>

                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div>
                                <label class="block text-sm font-bold text-gray-900 mb-2">Hora Inicio</label>
                                <input id="horaInicioVisible" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" placeholder="Ej: 04:30 PM" />
                                <input type="hidden" th:field="*{horaInicio}" id="horaInicioHidden" />
                            </div>
                            
                            <div>
                                <label class="block text-sm font-bold text-gray-900 mb-2">Hora Fin</label>
                                <input id="horaFinVisible" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition" placeholder="Ej: 05:30 PM" />
                                <input type="hidden" th:field="*{horaFin}" id="horaFinHidden" />
                            </div>
                        </div>

                        
                        <div class="flex gap-3 pt-6 border-t border-gray-200">
                            <a th:href="@{/gestionarhorarios}" class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg transition font-medium flex items-center justify-center">
                                <i class="fas fa-times mr-2"></i>Cancelar
                            </a>
                            <button type="submit" class="flex-1 px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg transition font-medium flex items-center justify-center">
                                <i class="fas fa-save mr-2"></i>Guardar Horario
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        function to24(time12) {
            if (!time12) return '';
            time12 = time12.trim().toUpperCase();
            var m24 = time12.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
            if (m24) {
                var hh = String(parseInt(m24[1],10)).padStart(2,'0');
                return hh + ':' + m24[2];
            }

            var m = time12.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)$/i);
            if (!m) return '';
            var h = parseInt(m[1],10);
            var mm = m[2] ? m[2] : '00';
            var ampm = m[3].toUpperCase();
            if (ampm === 'PM' && h !== 12) h += 12;
            if (ampm === 'AM' && h === 12) h = 0;
            return String(h).padStart(2,'0') + ':' + mm;
        }

        function to12(time24) {
            if (!time24) return '';
            var parts = time24.split(':');
            if (parts.length < 2) return '';
            var h = parseInt(parts[0],10);
            var m = parts[1];
            var ampm = (h >= 12) ? 'PM' : 'AM';
            if (h === 0) h = 12;
            else if (h > 12) h = h - 12;
            return h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
        }

        document.addEventListener('DOMContentLoaded', function() {
            try {
                if (typeof flatpickr !== 'undefined') {
                    flatpickr("#horaInicioVisible", { enableTime:true, noCalendar:true, time_24hr:false, dateFormat:"h:i K" });
                    flatpickr("#horaFinVisible",   { enableTime:true, noCalendar:true, time_24hr:false, dateFormat:"h:i K" });
                }
            } catch(e) {
                console.warn('flatpickr init failed', e);
            }

            const startHidden = document.getElementById('horaInicioHidden');
            const endHidden   = document.getElementById('horaFinHidden');
            const startVisible = document.getElementById('horaInicioVisible');
            const endVisible   = document.getElementById('horaFinVisible');

            if (startHidden && startHidden.value) startVisible.value = to12(startHidden.value);
            if (endHidden   && endHidden.value)   endVisible.value   = to12(endHidden.value);

            const form = document.getElementById('formHorario') || document.querySelector('form[action="/gestionarhorarios/guardar"]');
            if (form) {
                form.addEventListener('submit', function(e) {
                    var v1 = startVisible ? startVisible.value : '';
                    var v2 = endVisible ? endVisible.value : '';
                    var s24 = to24(v1);
                    var e24 = to24(v2);

                    if (!s24 || !e24) {
                        e.preventDefault();
                        alert('Formato de hora invÃ¡lido. Use el selector o escriba por ejemplo "04:30 PM".');
                        return;
                    }

                    var sParts = s24.split(':').map(Number);
                    var eParts = e24.split(':').map(Number);
                    var sMinutes = sParts[0]*60 + sParts[1];
                    var eMinutes = eParts[0]*60 + eParts[1];
                    if (sMinutes >= eMinutes) {
                        e.preventDefault();
                        alert('La hora de inicio debe ser anterior a la hora de fin.');
                        return;
                    }

                    startHidden.value = s24;
                    endHidden.value   = e24;
                });
            }
        });
    </script>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
