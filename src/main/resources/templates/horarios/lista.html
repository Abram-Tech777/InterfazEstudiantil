<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Mantenimiento de Horarios')"></head>
<body class="bg-light">

    <div th:replace="/fragments/menu :: menu"></div>

    <div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Gestión de Programación Académica</h4>
            <a th:href="@{/gestionarhorarios/nuevo}" class="btn btn-success btn-sm">Añadir Nuevo Horario</a>
        </div>
        <div class="card-body">

            <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${mensajeExito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${mensajeError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-secondary text-uppercase" style="font-size: 0.85rem;">
                        <tr>
                            <th>ID</th>
                            <th>Aula (Grado/Sección)</th>
                            <th>ID Docente</th>
                            <th>ID Curso</th>
                            <th>Día</th>
                            <th>Hora Inicio</th>
                            <th>Hora Fin</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="h : ${horarios}">
                            <td th:text="${h.idHorario}" class="fw-bold"></td>
                            <td th:text="${h.aula.grado + ' - ' + h.aula.seccion}"></td>
                            <td th:text="${docentesMap[h.idDocente] != null ? docentesMap[h.idDocente] : h.idDocente}"></td>
                            <td th:text="${cursosMap[h.idCurso] != null ? cursosMap[h.idCurso] : h.idCurso}"></td>
                            <td>
                                <span class="badge bg-primary" th:text="${h.diaSemana}"></span>
                            </td>
                            <td th:text="${h.horaInicio != null ? h.horaInicio.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) : ''}"></td>
                            <td th:text="${h.horaFin != null ? h.horaFin.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) : ''}"></td>
                            <td class="text-center">
                                <a th:href="@{/gestionarhorarios/editar/{id}(id=${h.idHorario})}" class="btn btn-warning btn-sm me-2">Editar</a>
                                <a th:href="@{/gestionarhorarios/eliminar/{id}(id=${h.idHorario})}" 
                                   class="btn btn-danger btn-sm" 
                                   onclick="return confirm('¿Estás seguro de que deseas eliminar este horario?');">
                                   Eliminar
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(horarios)}">
                            <td colspan="8" class="text-center text-muted py-4">No hay horarios programados en el sistema actualmente.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>
    </div>
</div>

<div th:replace="/fragments/scripts :: scripts"></div>
</body>
</html>
