<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Gestión de Horarios')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#e60000] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Gestión de Horarios</h1>
            <a th:if="${!esDocente}" th:href="@{/gestionarhorarios/nuevo}" class="px-4 py-2 bg-white text-[#e60000] hover:bg-gray-100 rounded-lg text-sm font-semibold transition-all flex items-center">
                <i class="fas fa-plus mr-2"></i>Nuevo Horario
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <p class="text-gray-600 mb-6">Administra los horarios de clases</p>

                <!-- Messages -->
                <div th:if="${mensajeExito}" class="mb-6 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-check-circle mr-3 mt-1 text-green-600"></i>
                    <span th:text="${mensajeExito}"></span>
                </div>

                <div th:if="${mensajeError}" class="mb-6 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-exclamation-circle mr-3 mt-1 text-red-600"></i>
                    <span th:text="${mensajeError}"></span>
                </div>

                <!-- Table -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-gray-700">
                            <thead class="bg-gray-800 text-white sticky top-0">
                                <tr>
                                    <th class="px-6 py-4 text-left font-semibold">ID</th>
                                    <th class="px-6 py-4 text-left font-semibold">Aula</th>
                                    <th class="px-6 py-4 text-left font-semibold">Docente</th>
                                    <th class="px-6 py-4 text-left font-semibold">Curso</th>
                                    <th class="px-6 py-4 text-left font-semibold">Día</th>
                                    <th class="px-6 py-4 text-left font-semibold">Hora Inicio</th>
                                    <th class="px-6 py-4 text-left font-semibold">Hora Fin</th>
                                    <th class="px-6 py-4 text-center font-semibold">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="h : ${horarios}" class="border-t hover:bg-gray-50 transition">
                                    <td class="px-6 py-4 font-bold text-gray-900" th:text="${h.idHorario}"></td>
                                    <td class="px-6 py-4 font-medium text-gray-800" th:text="${h.aula.grado + ' - ' + h.aula.seccion}"></td>
                                    <td class="px-6 py-4" th:text="${docentesMap[h.idDocente] != null ? docentesMap[h.idDocente] : h.idDocente}"></td>
                                    <td class="px-6 py-4" th:text="${h.curso != null ? h.curso.nombreCurso : (cursosMap[h.idCurso] != null ? cursosMap[h.idCurso] : h.idCurso)}"></td>
                                    <td class="px-6 py-4">
                                        <span class="badge-status bg-purple-100 text-purple-700" th:text="${h.diaSemana}"></span>
                                    </td>
                                    <td class="px-6 py-4" th:text="${h.horaInicio != null ? h.horaInicio.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) : 'N/A'}"></td>
                                    <td class="px-6 py-4" th:text="${h.horaFin != null ? h.horaFin.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) : 'N/A'}"></td>
                                    <td class="px-6 py-4 text-center space-x-2" th:if="${!esDocente}">
                                        <a th:href="@{/gestionarhorarios/editar/{id}(id=${h.idHorario})}" 
                                           class="inline-flex items-center px-3 py-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded transition text-xs font-medium">
                                            <i class="fas fa-edit mr-1"></i>Editar
                                        </a>
                                        <a th:href="@{/gestionarhorarios/eliminar/{id}(id=${h.idHorario})}" 
                                           class="inline-flex items-center px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded transition text-xs font-medium"
                                           onclick="return confirm('¿Estás seguro de que deseas eliminar este horario?');">
                                            <i class="fas fa-trash mr-1"></i>Eliminar
                                        </a>
                                    </td>
                                    <td class="px-6 py-4 text-center" th:if="${esDocente}">
                                        <span class="text-xs text-gray-500">Ver solo</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(horarios)}" class="border-t">
                                    <td colspan="8" class="px-6 py-12 text-center text-gray-500">
                                        <i class="fas fa-inbox text-3xl mb-4"></i>
                                        <p class="text-gray-600 font-medium">No hay horarios programados</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
