<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Formulario de Usuario')"></head>
<body class="bg-gray-50 m-0 p-0 min-h-screen flex flex-col">

    <div th:replace="/fragments/menu :: menu"></div>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900" th:text="${usuario.idUsuario == 0 ? 'Registrar Usuario' : 'Modificar Usuario'}"></h1>
            <p class="text-gray-600 mt-1">Gestión de cuentas de usuario del sistema</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden max-w-2xl">
            <div class="bg-gradient-to-r from-red-50 to-red-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-bold text-gray-900">
                    <i class="fas fa-user-circle mr-2 text-red-600"></i>
                    <span th:text="${usuario.idUsuario == 0 ? 'Nueva Cuenta' : 'Editar Usuario'}"></span>
                </h2>
            </div>

            <form th:action="@{/gestionusuarios/guardar}" th:object="${usuario}" method="post" class="p-8">
                <input type="hidden" th:field="*{idUsuario}" />
                <input type="hidden" th:field="*{codUsuario}" />

                <!-- Código de Usuario (Solo edición) -->
                <div th:if="${usuario.idUsuario != 0}" class="mb-8 p-4 bg-gray-50 border border-gray-200 rounded-lg">
                    <p class="text-sm text-gray-600 uppercase font-semibold">Código de Acceso</p>
                    <p class="text-2xl font-bold text-gray-900 mt-2" th:text="${usuario.codUsuario}"></p>
                </div>

                <!-- Nombre Completo -->
                <div class="mb-8">
                    <label for="nombreCompleto" class="block text-sm font-bold text-gray-900 mb-2">Nombre Completo</label>
                    <input type="text" id="nombreCompleto" th:field="*{nombreCompleto}" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition"
                           placeholder="Ej: Paco Pérez" required />
                </div>

                <!-- Contraseña -->
                <div class="mb-8">
                    <label for="password" class="block text-sm font-bold text-gray-900 mb-2">Contraseña</label>
                    <input type="password" id="password" th:field="*{password}" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition"
                           placeholder="Asigna una contraseña para el ingreso"
                           th:attr="data-masked=${usuario.idUsuario != 0 ? 'true' : null}" />
                    <p th:if="${usuario.idUsuario != 0}" class="text-xs text-gray-500 mt-2">
                        <i class="fas fa-info-circle mr-1"></i>Dejar vacío para mantener la contraseña actual
                    </p>
                </div>

                <!-- Rol -->
                <div class="mb-8">
                    <label for="rol" class="block text-sm font-bold text-gray-900 mb-2">Rol del Sistema</label>
                    <select id="rol" th:field="*{rol}" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition" required>
                        <option value="">-- Seleccione un Rol --</option>
                        <option value="ADMINISTRADOR">
                            <i class="fas fa-shield-alt mr-1"></i>Administrador
                        </option>
                        <option value="DOCENTE">
                            <i class="fas fa-chalkboard-user mr-1"></i>Docente
                        </option>
                        <option value="ESTUDIANTE">
                            <i class="fas fa-graduation-cap mr-1"></i>Estudiante
                        </option>
                    </select>
                </div>

                <!-- Estado (Solo edición) -->
                <div th:if="${usuario.idUsuario != 0}" class="mb-8">
                    <label for="estado" class="block text-sm font-bold text-gray-900 mb-2">Estado de la Cuenta</label>
                    <select id="estado" th:field="*{estado}" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition" required>
                        <option value="ACTIVO">
                            <i class="fas fa-check-circle mr-1"></i>ACTIVO
                        </option>
                        <option value="INACTIVO">
                            <i class="fas fa-times-circle mr-1"></i>INACTIVO
                        </option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3 pt-6 border-t border-gray-200">
                    <a th:href="@{/gestionusuarios}" class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg transition font-medium flex items-center justify-center">
                        <i class="fas fa-times mr-2"></i>Cancelar
                    </a>
                    <button type="submit" class="flex-1 px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg transition font-medium flex items-center justify-center"
                            th:text="${usuario.idUsuario == 0 ? 'Registrar Cuenta' : 'Guardar Cambios'}">
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="/fragments/scripts :: scripts"></div>
    
    <script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function(){
        var pwd = document.getElementById('password');
        if(!pwd) return;
        var isMasked = pwd.getAttribute('data-masked');
        if(isMasked === 'true'){
            pwd.value = '••••••••';
            pwd.addEventListener('focus', function(){
                if(this.value === '••••••••') this.value = '';
            });
            pwd.addEventListener('blur', function(){
                if(this.value === '') this.value = '••••••••';
            });
        }
    });
    /*]]>*/
    </script>
</body>
</html>
