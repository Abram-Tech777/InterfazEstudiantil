<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Gestión de Usuarios')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#e60000] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Gestión de Usuarios</h1>
            <a th:href="@{/gestionusuarios/nuevo}" class="px-4 py-2 bg-white text-[#e60000] hover:bg-gray-100 rounded-lg text-sm font-semibold transition-all flex items-center">
                <i class="fas fa-plus mr-2"></i>Nuevo Usuario
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <p class="text-gray-600 mb-6">Administra las cuentas del sistema</p>

                <!-- Messages -->
                <div th:if="${mensajeExito}" class="mb-6 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-check-circle mr-3 mt-1 text-green-600"></i>
                    <span th:text="${mensajeExito}"></span>
                </div>

                <div th:if="${mensajeError}" class="mb-6 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-exclamation-circle mr-3 mt-1 text-red-600"></i>
                    <span th:text="${mensajeError}"></span>
                </div>

                <!-- Table -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-gray-700">
                            <thead class="bg-gray-800 text-white sticky top-0">
                                <tr>
                                    <th class="px-6 py-4 text-left font-semibold">ID</th>
                                    <th class="px-6 py-4 text-left font-semibold">Código</th>
                                    <th class="px-6 py-4 text-left font-semibold">Nombre Completo</th>
                                    <th class="px-6 py-4 text-left font-semibold">Rol</th>
                                    <th class="px-6 py-4 text-left font-semibold">Estado</th>
                                    <th class="px-6 py-4 text-center font-semibold">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(usuarios)}" class="border-t hover:bg-gray-50">
                                    <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                                        <i class="fas fa-inbox text-3xl mb-2"></i>
                                        <p>No hay usuarios registrados en el sistema</p>
                                    </td>
                                </tr>

                                <tr th:each="u : ${usuarios}" class="border-t hover:bg-gray-50 transition">
                                    <td class="px-6 py-4 font-bold text-gray-900" th:text="${u.idUsuario}"></td>
                                    <td class="px-6 py-4 font-mono text-gray-800" th:text="${u.codUsuario}"></td>
                                    <td class="px-6 py-4 text-gray-800" th:text="${u.nombreCompleto}"></td>
                                    <td class="px-6 py-4">
                                        <span th:if="${u.rol == 'ADMINISTRADOR'}" class="badge-status bg-red-100 text-red-700">
                                            <i class="fas fa-shield-alt mr-1"></i>Administrador
                                        </span>
                                        <span th:if="${u.rol == 'DOCENTE'}" class="badge-status bg-blue-100 text-blue-700">
                                            <i class="fas fa-chalkboard-user mr-1"></i>Docente
                                        </span>
                                        <span th:if="${u.rol == 'ESTUDIANTE'}" class="badge-status bg-green-100 text-green-700">
                                            <i class="fas fa-graduation-cap mr-1"></i>Estudiante
                                        </span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <span th:if="${u.estado == 'ACTIVO'}" class="badge-status bg-emerald-100 text-emerald-700">
                                            <i class="fas fa-check-circle mr-1"></i>Activo
                                        </span>
                                        <span th:if="${u.estado == 'INACTIVO'}" class="badge-status bg-gray-100 text-gray-700">
                                            <i class="fas fa-ban mr-1"></i>Inactivo
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-center space-x-2">
                                        <a th:href="@{/gestionusuarios/editar/{id}(id=${u.idUsuario})}" 
                                           class="inline-flex items-center px-3 py-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded transition text-xs font-medium">
                                            <i class="fas fa-edit mr-1"></i>Editar
                                        </a>
                                        <a th:href="@{/gestionusuarios/eliminar/{id}(id=${u.idUsuario})}" 
                                           class="inline-flex items-center px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded transition text-xs font-medium"
                                           onclick="return confirm('¿Deseas inhabilitar este usuario?');">
                                            <i class="fas fa-times-circle mr-1"></i>Inhabilitar
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
