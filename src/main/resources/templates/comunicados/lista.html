<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Comunicados')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#e60000] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Comunicados</h1>
            <a th:href="@{/gestioncomunicados/nuevo}" class="px-4 py-2 bg-white text-[#e60000] hover:bg-gray-100 rounded-lg text-sm font-semibold transition-all flex items-center">
                <i class="fas fa-plus mr-2"></i>Nuevo Comunicado
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <p class="text-gray-600 mb-6">Anuncios y notificaciones importantes</p>

                <div th:if="${mensajeExito}" class="mb-6 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-check-circle mr-3 mt-1 text-green-600"></i>
                    <span th:text="${mensajeExito}"></span>
                </div>

                <div th:if="${mensajeError}" class="mb-6 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-exclamation-circle mr-3 mt-1 text-red-600"></i>
                    <span th:text="${mensajeError}"></span>
                </div>

                <div th:if="${#lists.isEmpty(comunicados)}" class="bg-blue-50 border border-blue-200 text-blue-800 px-6 py-8 rounded-lg text-center">
                    <i class="fas fa-bell-slash text-3xl mb-4"></i>
                    <p class="text-lg font-medium">Sin comunicados</p>
                    <p class="text-sm mt-2">No hay comunicados disponibles en este momento</p>
                </div>

                <div th:if="${!#lists.isEmpty(comunicados)}" class="space-y-4">
                    <div th:each="c : ${comunicados}" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 hover:shadow-md transition card-hover">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-gray-900" th:text="${c.titulo}"></h3>
                                <p class="text-sm text-gray-600 mt-1 whitespace-pre-wrap" th:text="${c.contenido}"></p>
                            </div>
                            <div class="text-right shrink-0 ml-4">
                                <span class="inline-block bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-medium">
                                    <i class="fas fa-calendar-alt mr-1"></i><span th:text="${#temporals.format(c.fechaEmision, 'dd/MM/yyyy hh:mm a')}"></span>
                                </span>
                            </div>
                        </div>

                        <div class="pt-4 border-t border-gray-200">
                            <div class="flex items-center justify-between">
                                <p class="text-sm text-gray-600">
                                    <i class="fas fa-user-circle mr-2 text-gray-400"></i>
                                    <strong>Autor:</strong>
                                    <span th:text="${autorMap[c.autor.idUsuario] != null ? autorMap[c.autor.idUsuario] : (c.autor != null ? c.autor.nombreCompleto : 'Desconocido')}"></span>
                                </p>
                                <a th:if="${session.usuarioLogueado != null and c.autor != null and session.usuarioLogueado.idUsuario == c.autor.idUsuario}"
                                   th:href="@{/gestioncomunicados/editar/{id}(id=${c.idComunicado})}"
                                   class="px-3 py-1 bg-amber-500 hover:bg-amber-600 text-white rounded text-sm transition flex items-center gap-1">
                                    <i class="fas fa-pen"></i> Editar
                                </a>
                            </div>

                            <div th:if="${c.archivoData != null and c.archivoNombre != null and c.archivoNombre != ''}" class="mt-3 flex items-center justify-between gap-3">
                                <div class="flex items-center gap-3">
                                    <div th:if="${c.archivoTipo != null and c.archivoTipo.startsWith('image/')}">
                                        <img th:src="@{/gestioncomunicados/abrir/{id}(id=${c.idComunicado})}" alt="preview" class="h-16 rounded" />
                                    </div>
                                    <div th:if="${c.archivoTipo == null or !c.archivoTipo.startsWith('image/')}">
                                        <i class="fas fa-file-word text-2xl text-blue-600"></i>
                                    </div>
                                    <div>
                                        <div class="font-semibold text-sm" th:text="${c.archivoNombre}"></div>
                                        <div class="text-xs text-gray-400" th:text="${#numbers.formatDecimal(c.archivoData.length / 1024.0, 1, 2)} + ' KB'"></div>
                                    </div>
                                </div>
                                <div>
                                    <a th:href="@{/gestioncomunicados/descargar/{id}(id=${c.idComunicado})}" class="px-3 py-1 bg-green-600 text-white rounded text-sm">Descargar</a>
                                </div>
                            </div>

                            <div th:if="${c.archivos != null and !c.archivos.isEmpty()}" class="mt-3">
                                <p class="text-xs font-semibold text-gray-700 mb-2"><i class="fas fa-paperclip mr-1"></i>Archivos adjuntos:</p>
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                    <div th:each="archivo : ${c.archivos}" class="flex flex-col gap-1">
                                        <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs">
                                            <i th:class="${#strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.pdf')} ? 'fas fa-file-pdf text-red-500' : (${#strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.xls') or #strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.xlsx')} ? 'fas fa-file-excel text-green-600' : (${#strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.doc') or #strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.docx')} ? 'fas fa-file-word text-blue-600' : (${#strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.ppt') or #strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.pptx')} ? 'fas fa-file-powerpoint text-orange-600' : (${archivo.archivoTipo != null and archivo.archivoTipo.startsWith('image/')} ? 'fas fa-image text-blue-500' : 'fas fa-file text-yellow-500'))))"></i>
                                            <span class="truncate max-w-[120px]" th:text="${archivo.archivoNombre}"></span>
                                            <button type="button"
                                                    class="preview-toggle ml-1 w-5 h-5 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition"
                                                    th:attr="data-archivoid=${archivo.idArchivo}, data-url=@{/gestioncomunicados/abrirArchivo/{id}(id=${archivo.idArchivo})}, data-tipo=${archivo.archivoTipo}">
                                                <i class="fas fa-eye text-[10px] text-gray-500"></i>
                                            </button>
                                            <a th:href="@{/gestioncomunicados/descargarArchivo/{id}(id=${archivo.idArchivo})}"
                                               class="w-5 h-5 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition">
                                                <i class="fas fa-download text-[10px] text-gray-500"></i>
                                            </a>
                                        </div>
                                        <div class="preview-cont hidden">
                                            <div th:if="${archivo.archivoTipo != null and archivo.archivoTipo.startsWith('image/')}" class="rounded-lg overflow-hidden border border-gray-200">
                                                <img th:src="@{/gestioncomunicados/abrirArchivo/{id}(id=${archivo.idArchivo})}" class="w-full max-h-96 object-contain" />
                                            </div>
                                            <div th:if="${archivo.archivoNombre != null and #strings.endsWith(#strings.toLowerCase(archivo.archivoNombre), '.pdf')}" class="rounded-lg overflow-hidden border border-gray-200">
                                                <embed th:src="@{/gestioncomunicados/abrirArchivo/{id}(id=${archivo.idArchivo})}" type="application/pdf" class="w-full h-[500px]" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.preview-toggle').forEach(function(btn) {
                var archivoId = btn.getAttribute('data-archivoid');
                var expanded = localStorage.getItem('com-preview-' + archivoId) === '1';
                if (expanded) togglePreview(btn, true);
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    togglePreview(this);
                });
            });

            function togglePreview(btn, forceExpand) {
                var cont = btn.closest('.flex.flex-col').querySelector('.preview-cont');
                if (!cont) return;
                var archivoId = btn.getAttribute('data-archivoid');
                var isHidden = cont.classList.contains('hidden');
                var expand = forceExpand !== undefined ? forceExpand : isHidden;
                if (expand) {
                    cont.classList.remove('hidden');
                    btn.querySelector('i').className = 'fas fa-eye-slash text-[10px] text-gray-500';
                    localStorage.setItem('com-preview-' + archivoId, '1');
                } else {
                    cont.classList.add('hidden');
                    btn.querySelector('i').className = 'fas fa-eye text-[10px] text-gray-500';
                    localStorage.setItem('com-preview-' + archivoId, '0');
                }
            }
        });
    </script>
</body>
</html>
