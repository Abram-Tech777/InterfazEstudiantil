<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Panel Administrador')}"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#a03030] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Panel de Control</h1>
            <div class="flex items-center gap-6">
                <button class="text-red-200 hover:text-white transition-colors text-xl">
                    <i class="fas fa-question-circle"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="w-[95%] mx-auto">
                <p class="text-gray-600 mb-6">Bienvenido, selecciona un módulo para gestionar el colegio.</p>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <a th:href="@{/gestionusuarios}" class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-shadow duration-300 p-6 border border-gray-100 flex items-center space-x-4 group">
                        <div class="bg-blue-50 p-4 rounded-lg text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <i class="fas fa-users text-2xl"></i>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-800">Usuarios</h3>
                            <p class="text-sm text-gray-500">Cuentas y roles</p>
                        </div>
                    </a>

                    <a th:href="@{/gestionaulas}" class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-shadow duration-300 p-6 border border-gray-100 flex items-center space-x-4 group">
                        <div class="bg-green-50 p-4 rounded-lg text-green-600 group-hover:bg-green-600 group-hover:text-white transition-colors">
                            <i class="fas fa-chalkboard text-2xl"></i>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-800">Aulas</h3>
                            <p class="text-sm text-gray-500">Grados y secciones</p>
                        </div>
                    </a>

                    <a th:href="@{/gestioncomunicados/lista}" class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-shadow duration-300 p-6 border border-gray-100 flex items-center space-x-4 group">
                        <div class="bg-yellow-50 p-4 rounded-lg text-yellow-600 group-hover:bg-yellow-500 group-hover:text-white transition-colors">
                            <i class="fas fa-bullhorn text-2xl"></i>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-800">Comunicados</h3>
                            <p class="text-sm text-gray-500">Anuncios oficiales</p>
                        </div>
                    </a>

                    <a th:href="@{/gestionarhorarios}" class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-shadow duration-300 p-6 border border-gray-100 flex items-center space-x-4 group">
                        <div class="bg-purple-50 p-4 rounded-lg text-purple-600 group-hover:bg-purple-600 group-hover:text-white transition-colors">
                            <i class="fas fa-calendar-alt text-2xl"></i>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-800">Horarios</h3>
                            <p class="text-sm text-gray-500">Gestión de tiempos</p>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
