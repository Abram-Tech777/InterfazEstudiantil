<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Acceso al Sistema')}"></head>
<body class="m-0 p-0 h-screen flex">

    <div class="hidden md:flex w-1/2 bg-[#e60000] text-white p-16 flex-col justify-center">
        <h1 class="text-5xl font-bold mb-8">Intranet Escolar</h1>
        <p class="text-xl mb-8 opacity-90">Acceso exclusivo para alumnos, docentes y personal administrativo.</p>
        <ul class="space-y-4">
            <li><i class="fas fa-arrow-right mr-3"></i> Gestiona tus horarios</li>
            <li><i class="fas fa-arrow-right mr-3"></i> Visualiza comunicados oficiales</li>
            <li><i class="fas fa-arrow-right mr-3"></i> Control de asistencia</li>
        </ul>
    </div>

    <div class="w-full md:w-1/2 flex items-center justify-center bg-white p-8">
        <div class="w-full max-w-sm">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-gray-800">Iniciar Sesión</h2>
                <p class="text-gray-500 text-sm">Ingresa tus credenciales</p>
            </div>

            <form th:action="@{/login}" method="post">
                <div th:if="${error}" class="bg-red-50 text-red-600 p-3 rounded text-center mb-4 text-sm" th:text="${error}"></div>
                
                <div class="mb-5">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Código de Usuario</label>
                    <input type="text" name="codUsuario" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
                </div>
                
                <div class="mb-8">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Contraseña</label>
                    <input type="password" name="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
                </div>
                
                <button type="submit" class="w-full bg-[#e60000] hover:bg-red-700 text-white font-bold py-3 rounded-lg shadow-lg transition">Ingresar</button>
            </form>
        </div>
    </div>
	<div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
