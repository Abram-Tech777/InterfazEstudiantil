<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Asignar Docentes')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#a03030] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Asignar Docentes</h1>
            <span class="text-red-200 text-sm">
                <span th:text="${aula.grado}"></span> - Sección <span th:text="${aula.seccion}"></span>
                (Capacidad: <span th:text="${aula.capacidad}"></span>)
            </span>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <!-- Form Card -->
                <form method="POST" th:action="@{/gestionaulas/asignar/{id}(id=${aula.idAula})}" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    
                    <!-- Tabla de docentes -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-gray-700">
                            <thead class="bg-gray-800 text-white sticky top-0">
                                <tr>
                                    <th class="px-6 py-4 text-left font-semibold w-12">
                                        <input type="checkbox" id="selectAll" class="w-4 h-4 cursor-pointer">
                                    </th>
                                    <th class="px-6 py-4 text-left font-semibold">Docente</th>
                                    <th class="px-6 py-4 text-left font-semibold">Rol Asignado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="docente : ${todosDocentes}" class="border-t hover:bg-gray-50 transition">
                                    <td class="px-6 py-4">
                                        <input type="checkbox" 
                                               name="docentes" 
                                               class="docente-checkbox w-4 h-4 cursor-pointer"
                                               th:value="${docente.idDocente}"
                                               th:checked="${idsAsignados.contains(docente.idDocente)}"/>
                                    </td>
                                    <td class="px-6 py-4 font-medium text-gray-900" th:text="${docente.nombreCompleto}"></td>
                                    <td class="px-6 py-4">
                                        <select th:name="${'rolAsignado_' + docente.idDocente}" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                                            <option value="DOCENTE" th:selected="${rolesPorDocente[docente.idDocente] == null ? true : rolesPorDocente[docente.idDocente] == 'DOCENTE'}">
                                                DOCENTE
                                            </option>
                                            <option value="TUTOR" th:selected="${rolesPorDocente[docente.idDocente] == 'TUTOR'}">
                                                TUTOR
                                            </option>
                                            <option value="AUXILIAR" th:selected="${rolesPorDocente[docente.idDocente] == 'AUXILIAR'}">
                                                AUXILIAR
                                            </option>
                                        </select>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Rol por defecto -->
                    <div class="p-6 border-t border-gray-200 bg-gray-50">
                        <label for="rol" class="block text-sm font-bold text-gray-900 mb-2">
                            <i class="fas fa-crown mr-1 text-purple-600"></i>Rol por Defecto
                        </label>
                        <div class="flex items-center gap-4">
                            <select id="rol" name="rol" class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition">
                                <option value="DOCENTE">DOCENTE</option>
                                <option value="TUTOR">TUTOR</option>
                                <option value="AUXILIAR">AUXILIAR</option>
                            </select>
                            <p class="text-xs text-gray-600">
                                <i class="fas fa-info-circle mr-1"></i>Se aplicará a los docentes seleccionados
                            </p>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex gap-3">
                        <button type="submit" class="flex-1 px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg transition font-medium flex items-center justify-center">
                            <i class="fas fa-save mr-2"></i>Guardar Asignaciones
                        </button>
                        <a href="/gestionaulas" class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg transition font-medium flex items-center justify-center">
                            <i class="fas fa-arrow-left mr-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            const selectAllCheckbox = document.getElementById('selectAll');
            const docenteCheckboxes = document.querySelectorAll('.docente-checkbox');
            
            if (selectAllCheckbox) {
                selectAllCheckbox.addEventListener('change', function(){
                    docenteCheckboxes.forEach(checkbox => {
                        checkbox.checked = this.checked;
                    });
                });
            }
            
            const defaultRolSelect = document.getElementById('rol');
            if(defaultRolSelect){
                defaultRolSelect.addEventListener('change', function(){
                    const selectedRole = this.value;
                    document.querySelectorAll('input[name="docentes"]:checked').forEach(function(checkbox){
                        const selectPerDocente = document.querySelector('select[name="rolAsignado_' + checkbox.value + '"]');
                        if(selectPerDocente) selectPerDocente.value = selectedRole;
                    });
                });
            }
        });
    </script>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
