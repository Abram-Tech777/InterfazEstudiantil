<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Formulario de Aula')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#e60000] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold" th:text="${aula.idAula == 0 ? 'Registrar Aula' : 'Modificar Aula'}"></h1>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-4xl mx-auto">
                <p class="text-gray-600 mb-6">Gestión de información del aula</p>

                <!-- Error Message -->
                <div th:if="${mensajeError}" class="mb-6 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-exclamation-circle mr-3 mt-1 text-red-600"></i>
                    <span th:text="${mensajeError}"></span>
                </div>

                <!-- Form Card -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gradient-to-r from-purple-50 to-purple-100 px-6 py-4 border-b border-gray-200">
                        <h2 class="text-xl font-bold text-gray-900">
                            <i class="fas fa-door-open mr-2 text-purple-600"></i>
                            <span th:text="${aula.idAula == 0 ? 'Nueva Aula' : 'Editar Aula'}"></span>
                        </h2>
                    </div>

                    <form th:action="@{/gestionaulas/guardar}" th:object="${aula}" method="post" class="p-8">
                        <input type="hidden" th:field="*{idAula}" />

                        <!-- Grado -->
                        <div class="mb-8">
                            <label for="grado" class="block text-sm font-bold text-gray-900 mb-2">Grado / Nivel Académico</label>
                            <input type="text" id="grado" th:field="*{grado}" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
                                   placeholder="Ej: 1ero Secundaria, 5to Primaria" required maxlength="20" />
                            <p class="text-xs text-gray-500 mt-2">
                                <i class="fas fa-info-circle mr-1"></i>Ingresa el grado y nivel académico
                            </p>
                        </div>

                        <!-- Sección -->
                        <div class="mb-8">
                            <label for="seccion" class="block text-sm font-bold text-gray-900 mb-2">Sección</label>
                            <input type="text" id="seccion" th:field="*{seccion}" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
                                   placeholder="Ej: A, B, Única" required maxlength="5" />
                            <p class="text-xs text-gray-500 mt-2">
                                <i class="fas fa-info-circle mr-1"></i>Letra o identificador de la sección
                            </p>
                        </div>

                        <!-- Capacidad -->
                        <div class="mb-8">
                            <label for="capacidad" class="block text-sm font-bold text-gray-900 mb-2">Capacidad Máxima</label>
                            <input type="number" id="capacidad" th:field="*{capacidad}" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
                                   min="1" placeholder="Cantidad de carpetas/alumnos" required />
                            <p class="text-xs text-gray-500 mt-2">
                                <i class="fas fa-info-circle mr-1"></i>Número máximo de alumnos en el aula
                            </p>
                        </div>

                        <!-- Buttons -->
                        <div class="flex gap-3 pt-6 border-t border-gray-200">
                            <a th:href="@{/gestionaulas}" class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg transition font-medium flex items-center justify-center">
                                <i class="fas fa-times mr-2"></i>Cancelar
                            </a>
                            <button type="submit" class="flex-1 px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg transition font-medium flex items-center justify-center"
                                    th:text="${aula.idAula == 0 ? 'Guardar Registro' : 'Guardar Cambios'}">
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
