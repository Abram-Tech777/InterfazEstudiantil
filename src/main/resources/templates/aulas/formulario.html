<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Formulario de Aula')"></head>
<body class="bg-light">

    <div th:replace="/fragments/menu :: menu"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0" th:text="${aula.idAula == 0} ? 'Registrar Aula' : 'Modificar Aula'">Formulario Aula</h4>
                    </div>
                    <div class="card-body p-4">

                        <div th:if="${mensajeError}" class="alert alert-danger" role="alert">
                            <span th:text="${mensajeError}"></span>
                        </div>

                        <form th:action="@{/gestionaulas/guardar}" th:object="${aula}" method="post">
                            
                            <input type="hidden" th:field="*{idAula}" />

                            <div class="mb-3">
                                <label for="grado" class="form-label fw-bold">Grado / Nivel Académico:</label>
                                <input type="text" id="grado" th:field="*{grado}" class="form-control" 
                                       placeholder="Ej: 1ero Secundaria, 5to Primaria" required maxlength="20" />
                            </div>

                            <div class="mb-3">
                                <label for="seccion" class="form-label fw-bold">Sección:</label>
                                <input type="text" id="seccion" th:field="*{seccion}" class="form-control" 
                                       placeholder="Ej: A, B, Única" required maxlength="5" />
                            </div>

                            <div class="mb-4">
                                <label for="capacidad" class="form-label fw-bold">Capacidad Máxima:</label>
                                <input type="number" id="capacidad" th:field="*{capacidad}" class="form-control" 
                                       min="1" placeholder="Cantidad de carpetas/alumnos" required />
                            </div>

                            <div class="d-flex justify-content-between">
                                <a th:href="@{/gestionaulas}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success" th:text="${aula.idAula == 0} ? 'Guardar Registro' : 'Guardar Cambios'"></button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="/fragments/scripts :: scripts"></div>

</body>
</html>
