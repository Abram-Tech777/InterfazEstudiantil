<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Asignar Alumnos')"></head>
<body class="bg-gray-50 m-0 p-0 min-h-screen flex flex-col">

    <div th:replace="fragments/menu :: menu"></div>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Asignar Alumnos</h1>
            <p class="text-gray-600 mt-1">
                Aula: <span th:text="${aula.grado}"></span> - Sección <span th:text="${aula.seccion}"></span> 
                (Capacidad: <span th:text="${aula.capacidad}"></span> alumnos)
            </p>
        </div>

        <!-- Form Card -->
        <form method="POST" th:action="@{/gestionaulas/asignarAlumnos/{id}(id=${aula.idAula})}" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            
            <!-- Tabla de alumnos -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-gray-700">
                    <thead class="bg-gray-800 text-white sticky top-0">
                        <tr>
                            <th class="px-6 py-4 text-left font-semibold w-12">
                                <input type="checkbox" id="selectAll" class="w-4 h-4 cursor-pointer">
                            </th>
                            <th class="px-6 py-4 text-left font-semibold">Alumno</th>
                            <th class="px-6 py-4 text-left font-semibold">Usuario</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="alumno : ${todosAlumnos}" class="border-t hover:bg-gray-50 transition">
                            <td class="px-6 py-4">
                                <input type="checkbox" 
                                       name="alumnos" 
                                       class="alumno-checkbox w-4 h-4 cursor-pointer"
                                       th:value="${alumno.idAlumno}"
                                       th:checked="${idsAsignados.contains(alumno.idAlumno)}" />
                            </td>
                            <td class="px-6 py-4 font-medium text-gray-900" 
                                th:text="${(alumno.nombreCompleto != null and !#strings.isEmpty(alumno.nombreCompleto)) ? alumno.nombreCompleto : (alumno.nombre + ' ' + alumno.apellido)}"></td>
                            <td class="px-6 py-4">
                                <span class="badge-status bg-blue-100 text-blue-700" th:text="${alumno.usuario.codUsuario}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Buttons -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex gap-3">
                <button type="submit" class="flex-1 px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg transition font-medium flex items-center justify-center">
                    <i class="fas fa-save mr-2"></i>Guardar Asignaciones
                </button>
                <a href="/gestionaulas" class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg transition font-medium flex items-center justify-center">
                    <i class="fas fa-arrow-left mr-2"></i>Cancelar
                </a>
            </div>
        </form>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            // Select All checkbox
            const selectAllCheckbox = document.getElementById('selectAll');
            const alumnoCheckboxes = document.querySelectorAll('.alumno-checkbox');
            
            if (selectAllCheckbox) {
                selectAllCheckbox.addEventListener('change', function(){
                    alumnoCheckboxes.forEach(checkbox => {
                        checkbox.checked = this.checked;
                    });
                });
            }
        });
    </script>

    <div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
