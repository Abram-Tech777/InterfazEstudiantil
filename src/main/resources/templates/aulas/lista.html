<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Gestión de Aulas')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#a03030] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Gestión de Aulas</h1>
            <a th:href="@{/gestionaulas/nuevo}" class="px-4 py-2 bg-white text-[#e60000] hover:bg-gray-100 rounded-lg text-sm font-semibold transition-all flex items-center">
                <i class="fas fa-plus mr-2"></i>Nueva Aula
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <p class="text-gray-600 mb-6">Administra grados, secciones y capacidades</p>

                <!-- Messages -->
                <div th:if="${mensajeExito}" class="mb-6 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-check-circle mr-3 mt-1 text-green-600"></i>
                    <span th:text="${mensajeExito}"></span>
                </div>

                <div th:if="${mensajeError}" class="mb-6 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg flex items-start">
                    <i class="fas fa-exclamation-circle mr-3 mt-1 text-red-600"></i>
                    <span th:text="${mensajeError}"></span>
                </div>

                <!-- Table -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-gray-700">
                            <thead class="bg-gray-800 text-white sticky top-0">
                                <tr>
                                    <th class="px-6 py-4 text-left font-semibold">ID</th>
                                    <th class="px-6 py-4 text-left font-semibold">Grado / Nivel</th>
                                    <th class="px-6 py-4 text-left font-semibold">Sección</th>
                                    <th class="px-6 py-4 text-center font-semibold">Capacidad</th>
                                    <th class="px-6 py-4 text-center font-semibold">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(aulas)}" class="border-t">
                                    <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                                        <i class="fas fa-inbox text-3xl mb-4"></i>
                                        <p class="text-gray-600 font-medium">No hay aulas registradas</p>
                                    </td>
                                </tr>
                                
                                <tr th:each="a : ${aulas}" class="border-t hover:bg-gray-50 transition">
                                    <td class="px-6 py-4 font-bold text-gray-900" th:text="${a.idAula}"></td>
                                    <td class="px-6 py-4 font-medium text-gray-800" th:text="${a.grado}"></td>
                                    <td class="px-6 py-4">
                                        <span class="badge-status bg-blue-100 text-blue-700" th:text="${a.seccion}"></span>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <span class="badge-status bg-purple-100 text-purple-700">
                                            <i class="fas fa-users mr-1"></i><span th:text="${a.capacidad}"></span>
                                        </span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex justify-center gap-2 flex-wrap">
                                            <a th:href="@{/gestionaulas/detalle/{id}(id=${a.idAula})}" 
                                               class="inline-flex items-center px-2 py-1.5 bg-cyan-50 text-cyan-600 hover:bg-cyan-100 rounded transition text-xs font-medium">
                                                <i class="fas fa-eye mr-1"></i>Ver
                                            </a>
                                            <a th:href="@{/gestionaulas/asignar/{id}(id=${a.idAula})}" 
                                               class="inline-flex items-center px-2 py-1.5 bg-green-50 text-green-600 hover:bg-green-100 rounded transition text-xs font-medium">
                                                <i class="fas fa-chalkboard-user mr-1"></i>Docentes
                                            </a>
                                            <a th:href="@{/gestionaulas/asignarAlumnos/{id}(id=${a.idAula})}" 
                                               class="inline-flex items-center px-2 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded transition text-xs font-medium">
                                                <i class="fas fa-users mr-1"></i>Alumnos
                                            </a>
                                            <a th:href="@{/gestionaulas/editar/{id}(id=${a.idAula})}" 
                                               class="inline-flex items-center px-2 py-1.5 bg-yellow-50 text-yellow-600 hover:bg-yellow-100 rounded transition text-xs font-medium">
                                                <i class="fas fa-edit mr-1"></i>Editar
                                            </a>
                                            <a th:href="@{/gestionaulas/eliminar/{id}(id=${a.idAula})}" 
                                               class="inline-flex items-center px-2 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded transition text-xs font-medium"
                                               onclick="return confirm('¿Estás seguro?');">
                                                <i class="fas fa-trash mr-1"></i>Eliminar
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>

</body>
</html>
