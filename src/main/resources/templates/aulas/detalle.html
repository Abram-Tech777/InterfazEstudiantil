<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Detalle del Aula')"></head>
<body class="bg-gray-50 m-0 p-0 min-h-screen flex flex-col">

    <div th:replace="fragments/menu :: menu"></div>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Detalle del Aula</h1>
            <p class="text-gray-600 mt-1">
                <span th:text="${aula.grado}"></span> - Sección <span th:text="${aula.seccion}"></span>
            </p>
        </div>

        <!-- Información del Aula -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 uppercase font-semibold">Capacidad</p>
                        <p class="text-3xl font-bold text-blue-600 mt-2" th:text="${aula.capacidad}"></p>
                    </div>
                    <i class="fas fa-chair text-4xl text-blue-100"></i>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 uppercase font-semibold">Grado</p>
                        <p class="text-3xl font-bold text-purple-600 mt-2" th:text="${aula.grado}"></p>
                    </div>
                    <i class="fas fa-graduation-cap text-4xl text-purple-100"></i>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 uppercase font-semibold">Sección</p>
                        <p class="text-3xl font-bold text-green-600 mt-2" th:text="${aula.seccion}"></p>
                    </div>
                    <i class="fas fa-layer-group text-4xl text-green-100"></i>
                </div>
            </div>
        </div>

        <!-- Docentes Asignados -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden mb-8">
            <div class="bg-gradient-to-r from-green-50 to-green-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-bold text-gray-900">
                    <i class="fas fa-chalkboard-user mr-2 text-green-600"></i>Docentes Asignados
                </h2>
            </div>
            
            <div class="p-6">
                <!-- Empty State -->
                <div th:if="${docentesAsignados.isEmpty()}" class="bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-lg text-center">
                    <i class="fas fa-info-circle mr-2"></i>No hay docentes asignados a esta aula.
                </div>
                
                <!-- Table -->
                <div th:if="${!docentesAsignados.isEmpty()}" class="overflow-x-auto">
                    <table class="w-full text-sm text-gray-700">
                        <thead class="bg-gray-800 text-white sticky top-0">
                            <tr>
                                <th class="px-6 py-4 text-left font-semibold">Docente</th>
                                <th class="px-6 py-4 text-left font-semibold">Rol</th>
                                <th class="px-6 py-4 text-center font-semibold">Activo</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ad : ${docentesAsignados}" class="border-t hover:bg-gray-50 transition">
                                <td class="px-6 py-4 font-medium text-gray-900" th:text="${ad.docente.nombreCompleto}"></td>
                                <td class="px-6 py-4">
                                    <span class="badge-status bg-blue-100 text-blue-700" th:text="${ad.rol}"></span>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <span th:if="${ad.activo}" class="badge-status bg-green-100 text-green-700">
                                        <i class="fas fa-check-circle mr-1"></i>Sí
                                    </span>
                                    <span th:unless="${ad.activo}" class="badge-status bg-red-100 text-red-700">
                                        <i class="fas fa-times-circle mr-1"></i>No
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Alumnos del Aula -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden mb-8">
            <div class="bg-gradient-to-r from-blue-50 to-blue-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-bold text-gray-900">
                    <i class="fas fa-users mr-2 text-blue-600"></i>Alumnos del Aula
                </h2>
            </div>
            
            <div class="p-6">
                <!-- Empty State -->
                <div th:if="${alumnos.isEmpty()}" class="bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-lg text-center">
                    <i class="fas fa-info-circle mr-2"></i>No hay alumnos registrados en esta aula.
                </div>
                
                <!-- Table -->
                <div th:if="${!alumnos.isEmpty()}" class="overflow-x-auto">
                    <table class="w-full text-sm text-gray-700">
                        <thead class="bg-gray-800 text-white sticky top-0">
                            <tr>
                                <th class="px-6 py-4 text-left font-semibold">#</th>
                                <th class="px-6 py-4 text-left font-semibold">Nombre</th>
                                <th class="px-6 py-4 text-left font-semibold">Usuario</th>
                                <th class="px-6 py-4 text-center font-semibold">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="alumno, iterStat : ${alumnos}" class="border-t hover:bg-gray-50 transition">
                                <td class="px-6 py-4 font-bold text-gray-900" th:text="${iterStat.count}"></td>
                                <td class="px-6 py-4 font-medium text-gray-900" th:text="${alumno.nombreCompleto != null && !#strings.isEmpty(alumno.nombreCompleto) ? alumno.nombreCompleto : alumno.nombre}"></td>
                                <td class="px-6 py-4">
                                    <span class="badge-status bg-gray-200 text-gray-700" th:text="${alumno.usuario != null ? alumno.usuario.codUsuario : 'N/A'}"></span>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <a th:href="@{/gestionaulas/quitarAlumno/{id}(id=${alumno.idAlumno})}" class="inline-flex items-center px-3 py-1 bg-red-100 text-red-700 hover:bg-red-200 rounded-lg transition text-sm font-medium">
                                        <i class="fas fa-trash mr-1"></i>Quitar
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="bg-gray-50 px-6 py-4 border border-gray-200 rounded-lg flex gap-3 flex-wrap">
            <a href="/gestionaulas" class="inline-flex items-center px-4 py-2 border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg transition font-medium">
                <i class="fas fa-arrow-left mr-2"></i>Volver a Aulas
            </a>
            <a th:href="@{/gestionaulas/asignar/{id}(id=${aula.idAula})}" class="inline-flex items-center px-4 py-2 bg-orange-600 text-white hover:bg-orange-700 rounded-lg transition font-medium">
                <i class="fas fa-edit mr-2"></i>Editar Asignaciones
            </a>
            <a th:href="@{/gestionaulas/asignarAlumnos/{id}(id=${aula.idAula})}" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-lg transition font-medium">
                <i class="fas fa-user-plus mr-2"></i>Asignar Alumnos
            </a>
        </div>
    </main>

    <div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
