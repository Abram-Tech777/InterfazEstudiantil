<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Mi Asistencia')"></head>
<body class="bg-gray-50 m-0 p-0 min-h-screen flex flex-col">

    <div th:replace="/fragments/menu :: menu"></div>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Mi Asistencia</h1>
            <p class="text-gray-600 mt-1">Registro de tu asistencia en clases</p>
        </div>

        <!-- Empty State -->
        <div th:if="${asistencias == null or asistencias.isEmpty()}" class="bg-blue-50 border border-blue-200 text-blue-800 px-6 py-8 rounded-lg text-center">
            <i class="fas fa-inbox text-3xl mb-4"></i>
            <p class="text-lg font-medium">Sin registros de asistencia</p>
            <p class="text-sm mt-2">Tu docente registrará tu asistencia en clase</p>
        </div>

        <!-- Table -->
        <div th:if="${asistencias != null and !asistencias.isEmpty()}" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-gray-700">
                    <thead class="bg-gray-800 text-white sticky top-0">
                        <tr>
                            <th class="px-6 py-4 text-left font-semibold">Curso</th>
                            <th class="px-6 py-4 text-left font-semibold">Docente</th>
                            <th class="px-6 py-4 text-left font-semibold">Fecha</th>
                            <th class="px-6 py-4 text-left font-semibold">Día</th>
                            <th class="px-6 py-4 text-center font-semibold">Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="asistencia : ${asistencias}" class="border-t hover:bg-gray-50 transition"
                            th:class="${asistencia.estado == 'PRESENTE' ? 'bg-green-50' : (asistencia.estado == 'RETARDO' ? 'bg-yellow-50' : 'bg-red-50')}">
                            <td class="px-6 py-4 font-medium text-gray-800" th:text="${asistencia.curso != null ? asistencia.curso.nombreCurso : 'N/A'}"></td>
                            <td class="px-6 py-4 text-gray-700" th:text="${asistencia.horario != null && asistencia.horario.docente != null ? asistencia.horario.docente.getNombre() + ' ' + asistencia.horario.docente.getApellido() : 'N/A'}"></td>
                            <td class="px-6 py-4" th:text="${#temporals.format(asistencia.fecha, 'dd/MM/yyyy')}"></td>
                            <td class="px-6 py-4">
                                <span class="badge-status bg-purple-100 text-purple-700" th:text="${asistencia.horario != null ? asistencia.horario.diaSemana : 'N/A'}"></span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span th:if="${asistencia.estado == 'PRESENTE'}" class="badge-status bg-green-100 text-green-700">
                                    <i class="fas fa-check-circle mr-1"></i>Presente
                                </span>
                                <span th:if="${asistencia.estado == 'RETARDO'}" class="badge-status bg-yellow-100 text-yellow-700">
                                    <i class="fas fa-clock mr-1"></i>Retardo
                                </span>
                                <span th:if="${asistencia.estado == 'AUSENCIA'}" class="badge-status bg-red-100 text-red-700">
                                    <i class="fas fa-times-circle mr-1"></i>Ausencia
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Summary Stats -->
        <div th:if="${asistencias != null and !asistencias.isEmpty()}" class="grid grid-cols-3 gap-4 mt-8">
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 text-center">
                <div class="text-3xl font-bold text-green-600" th:text="${presentes}"></div>
                <p class="text-gray-600 text-sm mt-2">Presentes</p>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 text-center">
                <div class="text-3xl font-bold text-yellow-600" th:text="${retardos}"></div>
                <p class="text-gray-600 text-sm mt-2">Retardos</p>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 text-center">
                <div class="text-3xl font-bold text-red-600" th:text="${ausencias}"></div>
                <p class="text-gray-600 text-sm mt-2">Ausencias</p>
            </div>
        </div>
    </main>

    <div th:replace="/fragments/scripts :: scripts"></div>
</body>
</html>
