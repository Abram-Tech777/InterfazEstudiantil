<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Cuaderno de Control')"></head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-gradient-to-r from-[#8b1a1a] to-[#a03030] shadow-lg px-8 flex items-center justify-between z-10 text-white">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold tracking-tight">Mi Cuaderno de Control</h1>
                <span class="hidden md:inline-block px-3 py-1 bg-white/15 rounded-full text-xs font-medium" th:text="${alumno.nombreCompleto}"></span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-8 custom-scrollbar">
            <div class="max-w-7xl mx-auto space-y-6">

                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Asistencia</p>
                                <p class="text-2xl font-black text-gray-800 mt-1" th:text="${pctAsistencia + '%'}">0%</p>
                            </div>
                            <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-calendar-check text-green-500 text-xl"></i>
                            </div>
                        </div>
                        <div class="mt-3 w-full bg-gray-100 rounded-full h-2">
                            <div class="h-2 rounded-full bg-green-500 transition-all duration-500" th:style="'width: ' + ${pctAsistencia} + '%'"></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Tardanzas</p>
                                <p class="text-2xl font-black text-gray-800 mt-1" th:text="${retardos}">0</p>
                            </div>
                            <div class="w-12 h-12 bg-yellow-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-clock text-yellow-500 text-xl"></i>
                            </div>
                        </div>
                        <p class="text-xs text-gray-400 mt-3">de <span th:text="${total}"></span> clases</p>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Ausencias</p>
                                <p class="text-2xl font-black text-gray-800 mt-1" th:text="${ausencias}">0</p>
                            </div>
                            <div class="w-12 h-12 bg-red-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-times-circle text-red-500 text-xl"></i>
                            </div>
                        </div>
                        <p class="text-xs text-gray-400 mt-3">de <span th:text="${total}"></span> clases</p>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Promedio</p>
                                <p class="text-2xl font-black text-gray-800 mt-1" th:text="${promedioGeneral}">--</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-chart-line text-blue-500 text-xl"></i>
                            </div>
                        </div>
                        <p class="text-xs text-gray-400 mt-3">nota general</p>
                    </div>
                </div>

                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 border-l-4 border-l-green-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Anotaciones Positivas</p>
                                <p class="text-2xl font-black text-green-600 mt-1" th:text="${positivas}">0</p>
                            </div>
                            <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-star text-green-500 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 border-l-4 border-l-red-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Anotaciones Negativas</p>
                                <p class="text-2xl font-black text-red-600 mt-1" th:text="${negativas}">0</p>
                            </div>
                            <div class="w-12 h-12 bg-red-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-exclamation-triangle text-red-500 text-xl"></i>
                            </div>
                        </div>
                    </div>
                </div>

                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Filtrar por Bimestre</label>
                            <div class="flex gap-1.5">
                                <a th:href="@{/estudiante/cuaderno-control(bimestre=0)}"
                                   class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                   th:classappend="${bimestreSel == 0} ? 'bg-[#a03030] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">Todos</a>
                                <a th:each="b : ${bimestres}" th:if="${b > 0}" th:href="@{/estudiante/cuaderno-control(bimestre=${b})}"
                                   class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                   th:classappend="${b == bimestreSel} ? 'bg-[#a03030] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                                   th:text="'B' + ${b}"></a>
                            </div>
                        </div>
                        <a th:href="@{/estudiante/cuaderno-control/descargar(bimestre=${bimestreSel})}"
                           class="inline-flex items-center px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-semibold transition-all">
                            <i class="fas fa-download mr-2"></i> Descargar Reporte
                        </a>
                    </div>
                </div>

                
                <div th:if="${#lists.isEmpty(conductas)}" class="bg-blue-50 border border-blue-200 text-blue-800 px-6 py-8 rounded-lg text-center">
                    <i class="fas fa-info-circle text-3xl mb-4"></i>
                    <p class="text-lg font-medium">No hay anotaciones para este filtro</p>
                </div>

                <div th:if="${!#lists.isEmpty(conductas)}" class="space-y-4">
                    <div th:each="c : ${conductas}" class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 transition-all hover:shadow-md"
                         th:style="'border-left: 4px solid ' + (${c.tipo == 'POSITIVA'} ? '#22c55e' : '#ef4444') + ';'">
                        <div class="flex items-start gap-4">
                            <div th:if="${c.tipo == 'POSITIVA'}" class="w-10 h-10 rounded-xl bg-green-50 flex items-center justify-center shrink-0 mt-1">
                                <i class="fas fa-star text-green-500"></i>
                            </div>
                            <div th:if="${c.tipo == 'NEGATIVA'}" class="w-10 h-10 rounded-xl bg-red-50 flex items-center justify-center shrink-0 mt-1">
                                <i class="fas fa-exclamation-triangle text-red-500"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span th:if="${c.tipo == 'POSITIVA'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-green-50 text-green-700">Positiva</span>
                                    <span th:if="${c.tipo == 'NEGATIVA'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-red-50 text-red-700">Negativa</span>
                                    <span class="text-xs text-gray-400">
                                        <i class="far fa-calendar-alt mr-1"></i><span th:text="${c.fechaRegistro != null ? #temporals.format(c.fechaRegistro, 'dd/MM/yyyy') : ''}"></span>
                                        <span class="ml-2">B<span th:text="${c.bimestre}"></span></span>
                                    </span>
                                </div>
                                <h3 class="font-bold text-gray-800" th:text="${c.titulo}"></h3>
                                <p th:if="${c.descripcion != null and !c.descripcion.isEmpty()}" class="text-sm text-gray-600 mt-1 leading-relaxed" th:text="${c.descripcion}"></p>
                                <p th:if="${c.docente != null}" class="text-xs text-gray-400 mt-2">
                                    <i class="fas fa-user-tie mr-1"></i> <span th:text="${c.docente.nombreCompleto}"></span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
