<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Mi Horario')"></head>
<body>
  <div th:replace="fragments/menu :: menu"></div>
  <div class="container mt-4">
    <h3>Mi Horario</h3>
    <div th:if="${#lists.isEmpty(horarios)}" class="alert alert-info">No se encontraron horarios para tu aula.</div>
    <div th:if="${!#lists.isEmpty(horarios)}" class="table-responsive">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Día</th>
            <th>Hora Inicio</th>
            <th>Hora Fin</th>
            <th>Aula</th>
            <th>Curso</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="h : ${horarios}">
            <td th:text="${h.diaSemana}"></td>
            <td th:text="${h.horaInicio != null ? h.horaInicio.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) : ''}"></td>
            <td th:text="${h.horaFin != null ? h.horaFin.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) : ''}"></td>
            <td th:text="${h.aula != null ? (h.aula.grado + ' - ' + h.aula.seccion) : ''}"></td>
            <td th:text="${h.curso != null ? h.curso.nombreCurso : h.idCurso}"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <a href="/estudiante/panel" class="btn btn-secondary">Volver</a>
  </div>
  <div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
