<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Mi Horario')"></head>
<body class="bg-gray-50 m-0 p-0 min-h-screen flex flex-col">

    <div th:replace="fragments/menu :: menu"></div>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Mi Horario</h1>
            <p class="text-gray-600 mt-1">Tu programa semanal de clases</p>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(horarios)}" class="bg-blue-50 border border-blue-200 text-blue-800 px-6 py-8 rounded-lg text-center">
            <i class="fas fa-calendar-times text-3xl mb-4"></i>
            <p class="text-lg font-medium">Sin horarios asignados</p>
            <p class="text-sm mt-2">Aún no hay horarios disponibles para tu aula</p>
        </div>

        <!-- Table -->
        <div th:if="${!#lists.isEmpty(horarios)}" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-gray-700">
                    <thead class="bg-gray-800 text-white sticky top-0">
                        <tr>
                            <th class="px-6 py-4 text-left font-semibold">Día</th>
                            <th class="px-6 py-4 text-left font-semibold">Hora Inicio</th>
                            <th class="px-6 py-4 text-left font-semibold">Hora Fin</th>
                            <th class="px-6 py-4 text-left font-semibold">Aula</th>
                            <th class="px-6 py-4 text-left font-semibold">Curso</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="h : ${horarios}" class="border-t hover:bg-gray-50 transition">
                            <td class="px-6 py-4">
                                <span class="badge-status bg-purple-100 text-purple-700 font-semibold" th:text="${h.diaSemana}"></span>
                            </td>
                            <td class="px-6 py-4 font-medium text-gray-800" th:text="${h.horaInicio != null ? h.horaInicio.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) : 'N/A'}"></td>
                            <td class="px-6 py-4" th:text="${h.horaFin != null ? h.horaFin.format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a')) : 'N/A'}"></td>
                            <td class="px-6 py-4">
                                <span class="badge-status bg-blue-100 text-blue-700" th:text="${h.aula != null ? (h.aula.grado + ' - ' + h.aula.seccion) : 'N/A'}"></span>
                            </td>
                            <td class="px-6 py-4 font-medium text-gray-800" th:text="${h.curso != null ? h.curso.nombreCurso : h.idCurso}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Back Button -->
        <div class="mt-8">
            <a href="/estudiante/panel" class="inline-flex items-center px-4 py-2 border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg transition font-medium">
                <i class="fas fa-arrow-left mr-2"></i>Volver al Panel
            </a>
        </div>
    </main>

    <div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
