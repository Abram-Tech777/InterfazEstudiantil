<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragments/head :: head('Mis Notas - Estudiante')}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body class="m-0 p-0 h-screen flex bg-[#f4f6f9] font-sans overflow-hidden">

    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-20 bg-[#e60000] shadow-md px-8 flex items-center justify-between z-10 text-white">
            <h1 class="text-2xl font-bold">Mis Calificaciones</h1>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
            <div class="w-[95%] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <div th:each="n : ${notas}" class="bg-white p-6 rounded-2xl shadow-sm border-l-4 hover:shadow-md transition-shadow"
                     th:classappend="${n.nota >= 11 ? 'border-green-500' : 'border-red-500'}">
                    
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800" th:text="${n.curso.nombreCurso}">Nombre Curso</h3>
                            <p class="text-xs text-gray-400 font-semibold uppercase mt-1" th:text="${n.tipoEvaluacion}">Tipo Evaluación</p>
                        </div>
                        <div class="text-3xl font-black" 
                             th:text="${n.nota}"
                             th:classappend="${n.nota >= 11 ? 'text-green-600' : 'text-red-600'}">15</div>
                    </div>

                    <div class="flex items-center justify-between text-sm text-gray-500 pt-4 border-t border-gray-50">
                        <span><i class="fas fa-calendar-alt mr-2 text-gray-300"></i><span th:text="${#temporals.format(n.fechaRegistro, 'dd/MM/yyyy')}">Fecha</span></span>
                        <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider" 
                              th:classappend="${n.nota >= 11 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}"
                              th:text="${n.nota >= 11 ? 'Aprobado' : 'Desaprobado'}">Estado</span>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(notas)}" class="col-span-full p-12 text-center text-gray-400 bg-white rounded-2xl border-2 border-dashed border-gray-200">
                    <i class="fas fa-folder-open text-5xl mb-4 text-gray-300"></i>
                    <p class="text-lg font-medium">No hay notas registradas en este periodo.</p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{/fragments/scripts :: scripts}"></div>
</body>
</html>
