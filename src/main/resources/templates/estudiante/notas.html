<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/fragments/head :: head('Mis Notas')"></head>
<body class="bg-gray-50 m-0 p-0 min-h-screen flex flex-col">

    <div th:replace="/fragments/menu :: menu"></div>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Mis Notas</h1>
            <p class="text-gray-600 mt-1">Calificaciones por bimestre</p>
        </div>

        <!-- Empty State -->
        <div th:if="${notas == null or notas.isEmpty()}" class="bg-blue-50 border border-blue-200 text-blue-800 px-6 py-8 rounded-lg text-center">
            <i class="fas fa-file-alt text-3xl mb-4"></i>
            <p class="text-lg font-medium">Sin notas registradas</p>
            <p class="text-sm mt-2">Tu docente subirá las calificaciones próximamente</p>
        </div>

        <!-- Table -->
        <div th:if="${notas != null and !notas.isEmpty()}" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-gray-700">
                    <thead class="bg-gray-800 text-white sticky top-0">
                        <tr>
                            <th class="px-6 py-4 text-left font-semibold">Curso</th>
                            <th class="px-6 py-4 text-center font-semibold">Bimestre</th>
                            <th class="px-6 py-4 text-center font-semibold">Nota</th>
                            <th class="px-6 py-4 text-left font-semibold">Docente</th>
                            <th class="px-6 py-4 text-left font-semibold">Fecha Registro</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="nota : ${notas}" class="border-t hover:bg-gray-50 transition">
                            <td class="px-6 py-4 font-medium text-gray-800" th:text="${nota.curso != null ? nota.curso.nombreCurso : 'N/A'}"></td>
                            <td class="px-6 py-4 text-center">
                                <span class="badge-status bg-purple-100 text-purple-700 font-bold">B<span th:text="${nota.bimestre}"></span></span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span th:if="${nota.nota != null}" class="badge-status text-white font-bold"
                                      th:classappend="${nota.nota.doubleValue() >= 13 ? 'bg-green-600' : nota.nota.doubleValue() >= 11 ? 'bg-blue-600' : nota.nota.doubleValue() >= 10 ? 'bg-yellow-600' : 'bg-red-600'}">
                                    <i class="fas fa-star mr-1"></i><span th:text="${nota.nota}"></span>
                                </span>
                                <span th:unless="${nota.nota != null}" class="badge-status bg-gray-300 text-gray-700">N/A</span>
                            </td>
                            <td class="px-6 py-4 text-gray-700" th:text="${nota.docente != null ? nota.docente.getNombre() + ' ' + nota.docente.getApellido() : 'N/A'}"></td>
                            <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(nota.fechaRegistro, 'dd/MM/yyyy')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Grade Legend -->
        <div th:if="${notas != null and !notas.isEmpty()}" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
            <div class="bg-green-50 border border-green-200 rounded-lg p-4 text-center">
                <div class="text-lg font-bold text-green-600">13 - 20</div>
                <p class="text-xs text-green-700 mt-1">Muy Bueno</p>
            </div>
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-center">
                <div class="text-lg font-bold text-blue-600">11 - 12</div>
                <p class="text-xs text-blue-700 mt-1">Bueno</p>
            </div>
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 text-center">
                <div class="text-lg font-bold text-yellow-600">10</div>
                <p class="text-xs text-yellow-700 mt-1">Regular</p>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                <div class="text-lg font-bold text-red-600">0 - 9</div>
                <p class="text-xs text-red-700 mt-1">Insuficiente</p>
            </div>
        </div>
    </main>

    <div th:replace="/fragments/scripts :: scripts"></div>
</body>
</html>
