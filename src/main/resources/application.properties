spring.application.name=InterfazEstudiantil


#MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/BD_COLEGIO?allowMultiQueries=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mysql

#DRIVER
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA - HIBERNATE
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=never
#spring.sql.init.data-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# Archivo Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=22MB
server.servlet.context-path=/
server.port=8090

# Jornada escolar
colegio.jornada.inicio=07:30
colegio.jornada.fin=15:30
colegio.jornada.recreo.inicio=10:00
colegio.jornada.recreo.duracion=45
colegio.jornada.clase.duracion=45